<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ABOUT.EXE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
/* =========================================================
   ABOUT.EXE — bio di lazyyy in formato crash report.
   Le righe compaiono progressivamente come un dump.
   ========================================================= */
:root{
  --white:#f0ede8; --grey-l:#c8c3bc; --grey-m:#8a857e; --grey-d:#3a3732;
  --black:#111010; --ph:#d4f5a0; --am:#ffcc44; --panel:#1c1a17;
  --glow-ph:0 0 4px rgba(212,245,160,.55);
  --glow-am:0 0 4px rgba(255,204,68,.55);
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{
  background:#101009; color:var(--grey-l);
  font-family:'Share Tech Mono',monospace; font-size:13px;
  cursor:crosshair; user-select:none; overflow:hidden;
  display:flex; flex-direction:column;
  -webkit-tap-highlight-color:transparent;
}
body::after{
  content:''; position:fixed; inset:0; pointer-events:none; z-index:9;
  background:repeating-linear-gradient(to bottom, rgba(0,0,0,0) 0 2px, rgba(0,0,0,.16) 3px);
}

/* banner STOP in alto, stile kernel panic */
.crash-head{
  flex-shrink:0; padding:10px 14px;
  background:rgba(255,204,68,.08); border-bottom:1px solid var(--am);
}
.crash-head .t{
  font-family:'VT323',monospace; font-size:30px; line-height:1;
  color:var(--am); text-shadow:var(--glow-am); letter-spacing:1px;
}
.crash-head .s{ color:var(--grey-m); font-size:11px; margin-top:3px; }

#dump{
  flex:1; overflow-y:auto; padding:12px 14px;
  line-height:1.55; white-space:pre-wrap; word-break:break-word;
}
#dump .ph{ color:var(--ph); text-shadow:var(--glow-ph); }
#dump .am{ color:var(--am); text-shadow:var(--glow-am); }
#dump .dim{ color:var(--grey-m); }
#dump a{ color:var(--am); text-shadow:var(--glow-am); }

/* cursore blocco ambra che lampeggia a step */
.cur{ display:inline-block; width:8px; height:13px; background:var(--am);
  vertical-align:-2px; animation:blink 1s steps(2) infinite; }
@keyframes blink{ 50%{ opacity:0; } }

.crash-foot{
  flex-shrink:0; padding:5px 14px;
  border-top:1px solid rgba(138,133,126,.3);
  font-size:11px; color:var(--grey-m);
}

::-webkit-scrollbar{ width:8px; }
::-webkit-scrollbar-track{ background:#101009; }
::-webkit-scrollbar-thumb{ background:var(--grey-m); border:1px solid var(--black); }

@media (max-width:480px){
  body{ font-size:12px; }
  .crash-head .t{ font-size:24px; }
}
</style>
</head>
<body>

<div class="crash-head">
  <div class="t">⚠ ARRESTO ANOMALO</div>
  <div class="s">ABOUT.EXE ha smesso di rispondere — generazione rapporto…</div>
</div>

<div id="dump"></div>

<div class="crash-foot">premi un tasto qualsiasi per continuare · (non cambierà niente)</div>

<script>
/* =========================================================
   ABOUT.EXE — dump progressivo della bio
   ========================================================= */
const SPOTIFY = 'https://open.spotify.com/artist/2YYiyxIraQIGFYQUImQzk0';
const dump = document.getElementById('dump');

/* Righe del rapporto: [html, classe]. Compaiono una alla volta. */
const LINES = [
  ['*** STOP: 0x4C5A5959 (ARTIST_OVERFLOW) ***', 'am'],
  ['&nbsp;', ''],
  ['PROCESSO      lazyyy.exe', 'ph'],
  ['STATO         non risponde <span class="dim">(comportamento previsto)</span>', ''],
  ['GENERE        sperimentale', ''],
  ['BIO UFFICIALE "wtf" <span class="dim">— 3 caratteri, nessun refuso</span>', ''],
  ['ULTIMA ATTIVITÀ  6h di sampling di un ventilatore. nessun rimpianto.', ''],
  ['&nbsp;', ''],
  ['MODULI CARICATI:', 'dim'],
  ['  CLICK!.dll          2026 · single', 'ph'],
  ['  #FFFFFF.sys         2026 · album', 'ph'],
  ['  non_c_e_pace.drv    2025 · single', 'ph'],
  ['&nbsp;', ''],
  ['TRACCE IN MEMORIA:', 'dim'],
  ['  sanguini · 987 · CLICK! · Occhi Lucidi · Matematica', ''],
  ['&nbsp;', ''],
  ['ANALISI ERRORE:', 'dim'],
  ['  il processo tenta da anni di suonare "normale".', ''],
  ['  tutti i tentativi terminati con codice 0xWTF.', ''],
  ['&nbsp;', ''],
  ['AZIONI CONSIGLIATE:', 'dim'],
  [`  &gt; <a href="${SPOTIFY}" target="_blank" rel="noopener">ascolta su spotify ⇗</a>`, ''],
  ['  &gt; riavvia il sistema <span class="dim">(non servirà)</span>', ''],
];

/* typeDump(): stampa le righe a cadenza, poi cursore fisso */
let i = 0;
function typeDump(){
  if(i >= LINES.length){
    const c = document.createElement('div');
    c.innerHTML = '<span class="cur"></span>';
    dump.appendChild(c);
    return;
  }
  const [html, cls] = LINES[i++];
  const d = document.createElement('div');
  if(cls) d.className = cls;
  d.innerHTML = html;
  dump.appendChild(d);
  dump.scrollTop = dump.scrollHeight;
  setTimeout(typeDump, 70 + Math.random() * 130);
}

/* qualsiasi tasto/tap: glitch rapido del titolo, nient'altro */
function pressAnyKey(){
  const t = document.querySelector('.crash-head .t');
  t.style.transform = 'translateX(2px)';
  setTimeout(() => { t.style.transform = ''; }, 80);
}
window.addEventListener('keydown', pressAnyKey);
window.addEventListener('pointerdown', pressAnyKey);

setTimeout(typeDump, 400);
</script>
</body>
</html>
