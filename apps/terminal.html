<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TERMINAL</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
/* =========================================================
   TERMINAL — app standalone (iframe). Comandi fake + EE-05.
   ========================================================= */
:root{
  --white:#f0ede8; --grey-l:#c8c3bc; --grey-m:#8a857e; --grey-d:#3a3732;
  --black:#111010; --ph:#d4f5a0; --am:#ffcc44; --panel:#1c1a17;
  --glow-ph:0 0 4px rgba(212,245,160,.55);
  --glow-am:0 0 4px rgba(255,204,68,.55);
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{
  background:#0c0c0b; color:var(--ph);
  font-family:'Share Tech Mono',monospace; font-size:13px;
  cursor:crosshair; overflow:hidden;
  display:flex; flex-direction:column;
  -webkit-tap-highlight-color:transparent;
}
/* scanline leggera su tutto il terminale */
body::after{
  content:''; position:fixed; inset:0; pointer-events:none; z-index:9;
  background:repeating-linear-gradient(to bottom, rgba(0,0,0,0) 0 2px, rgba(0,0,0,.18) 3px);
}

#out{
  flex:1; overflow-y:auto; padding:10px 12px;
  line-height:1.45; white-space:pre-wrap; word-break:break-word;
  text-shadow:var(--glow-ph);
  position:relative;   /* offsetTop dei figli relativo a #out (riposizionamento cat) */
}
#out .dim{ color:var(--grey-m); text-shadow:none; }
/* output "raw": niente wrapping, ogni carattere nella sua colonna
   (griglia da terminale vero); righe lunghe → scroll orizzontale */
#out .pre{ white-space:pre; word-break:normal; overflow-x:auto; }
#out .am{ color:var(--am); text-shadow:var(--glow-am); }
#out .err{ color:#ff6b5e; text-shadow:0 0 4px rgba(255,107,94,.5); }
#out a{ color:var(--am); text-shadow:var(--glow-am); }

/* riga input: prompt + campo reale (porta su la tastiera mobile) */
#in-row{
  flex-shrink:0; display:flex; align-items:center; gap:6px;
  padding:6px 12px 8px; border-top:1px solid rgba(138,133,126,.25);
}
#in-row .pr{ color:var(--am); text-shadow:var(--glow-am); white-space:nowrap; }
#cmd{
  flex:1; min-width:0; background:transparent; border:0; outline:0;
  color:var(--ph); text-shadow:var(--glow-ph);
  font-family:'Share Tech Mono',monospace; font-size:13px;
  caret-color:var(--am); cursor:crosshair;
}
/* toggle tastiera virtuale */
#kbd-toggle{
  flex-shrink:0; background:transparent; border:1px solid rgba(138,133,126,.4);
  color:var(--grey-m); font-family:'Share Tech Mono',monospace; font-size:13px;
  padding:1px 7px; cursor:crosshair;
}
#kbd-toggle.on{ color:var(--am); border-color:var(--am); text-shadow:var(--glow-am); }

/* tastiera virtuale on-screen */
#kbd{
  flex-shrink:0; background:var(--panel); padding:6px 6px 8px;
  border-top:1px solid rgba(138,133,126,.25); user-select:none;
}
#kbd.hidden{ display:none; }
#kbd .krow{ display:flex; gap:4px; justify-content:center; margin-top:4px; }
#kbd .krow:first-child{ margin-top:0; }
#kbd button{
  flex:1; max-width:42px; min-width:0; padding:7px 0;
  background:#14120f; border:1px solid rgba(138,133,126,.45);
  color:var(--ph); text-shadow:var(--glow-ph);
  font-family:'Share Tech Mono',monospace; font-size:13px;
  cursor:crosshair; touch-action:manipulation;
}
#kbd button.sp{ color:var(--am); text-shadow:var(--glow-am); max-width:64px; }
#kbd button.wide{ max-width:none; flex:5; }
#kbd button.enter{ flex:2.5; max-width:110px; }
#kbd button:active{ background:var(--ph); color:var(--black); text-shadow:none; }
/* tastiera virtuale solo su touch: su desktop c'è quella fisica */
@media (pointer: fine){
  #kbd, #kbd-toggle{ display:none; }
}

::-webkit-scrollbar{ width:8px; }
::-webkit-scrollbar-track{ background:#0c0c0b; }
::-webkit-scrollbar-thumb{ background:var(--grey-m); border:1px solid var(--black); }

@media (max-width:480px){
  body{ font-size:12px; }
  #cmd{ font-size:16px; }   /* <16px su iOS zooma la pagina al focus */
}
</style>
</head>
<body>

<div id="out"></div>
<div id="in-row">
  <span class="pr">lzyyy@LZYYY_SYS:~$</span>
  <input id="cmd" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false">
  <button id="kbd-toggle" class="on" title="tastiera on-screen">⌨</button>
</div>
<div id="kbd"></div>

<script src="../js/fakefs.js"></script>

/* =========================================================
   TERMINAL — interprete comandi fake
   ========================================================= */
const SPOTIFY = 'https://open.spotify.com/artist/2YYiyxIraQIGFYQUImQzk0';
const out = document.getElementById('out');
const cmd = document.getElementById('cmd');

/* print(html, cls): aggiunge una riga al log e scrolla in fondo.
   Ritorna il nodo creato (serve a cat per riposizionare la visuale) */
function print(html, cls){
  const d = document.createElement('div');
  if(cls) d.className = cls;
  d.innerHTML = html;
  out.appendChild(d);
  out.scrollTop = out.scrollHeight;
  return d;
}
/* normName(s): confronto permissivo dei nomi file — minuscole,
   ignora parentesi/underscore/trattini non digitabili da tastiera
   virtuale. '[CORROTTO].prj' ≡ 'corrotto.prj' */
function normName(s){
  return String(s).toLowerCase().replace(/[^a-z0-9.]/g, '');
}
/* esc(s): escape HTML dell'input utente */
function esc(s){
  return String(s).replace(/[&<>"]/g, (c) =>
    ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;' }[c]));
}

       chiusura del tab): riapplica i restore già fatti --- */
const RESTORED_KEY = 'lzyyy-restored';
function getRestored(){
  try{ return JSON.parse(sessionStorage.getItem(RESTORED_KEY)) || []; }
  catch(err){ return []; }
}
function markRestored(name){
  try{
    sessionStorage.setItem(RESTORED_KEY,
      JSON.stringify([...new Set([...getRestored(), normName(name)])]));
  }catch(err){}
}
Object.keys(TRASH).forEach((k) => {
  if(getRestored().includes(normName(k))){ FILES[k] = TRASH[k]; delete TRASH[k]; }
});

   virtuale (minuscole, niente accenti né simboli) */
function slug(name){
  return name.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '')
    .replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '') + '.wav';
}
/* dur(ms): ms → m:ss */
function dur(ms){
  const s = Math.round(ms / 1000);
  return Math.floor(s / 60) + ':' + String(s % 60).padStart(2, '0');
}
/* mountTracks(projects): monta le tracce in FILES come { meta, url } */
function mountTracks(projects){
  projects.forEach((p) => p.tracks.forEach((t) => {
    FILES[slug(t.name)] = {
      meta: `${t.name}\nprogetto: ${p.name} (${p.type}, ${p.date})\ndurata: ${dur(t.ms)} · dim: ${t.ms % 847} TB · mono emotivo`,
      url: t.url,
    };
  }));
}
mountTracks(FALLBACK_PROJECTS);
fetch('../data/discography.json')
  .then((r) => r.json())
  .then((d) => mountTracks(d.projects))
  .catch(() => {});

/* --- audio nascosto per `secret` (EE-05): drone generato --- */
let actx = null;
function playSecretDrone(){
  if(!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
  actx.resume();
  const now = actx.currentTime, DUR = 6;
  const g = actx.createGain();
  g.gain.setValueAtTime(0.0001, now);
  g.gain.linearRampToValueAtTime(0.18, now + 1.2);
  g.gain.linearRampToValueAtTime(0.0001, now + DUR);
  g.connect(actx.destination);
  // tre oscillatori leggermente scordati = pad inquietante
  [55, 55.7, 110.4].forEach((f) => {
    const o = actx.createOscillator();
    o.type = 'sawtooth'; o.frequency.value = f;
    const lp = actx.createBiquadFilter();
    lp.type = 'lowpass'; lp.frequency.value = 320;
    o.connect(lp); lp.connect(g);
    o.start(now); o.stop(now + DUR);
  });
}

/* =========================================================
   [CORROTTO].PRJ — glitch psichedelico fullscreen (~33s).
   Chiede al desktop (postMessage) di portare la finestra a
   schermo intero. Canvas low-res scalato: 12 modalità che si
   alternano ogni 2.75s — plasma, statica, tunnel, melt, barre,
   pioggia, caleidoscopio, rgb-split, zigzag, feedback, moiré,
   scacchiera — con resa pixelata/liscia alternata, corruzione
   a blocchi e tearing. Testo glitch in mix-blend difference.
   ========================================================= */
let corruptRunning = false;
function runCorrupt(){
  if(corruptRunning) return;
  corruptRunning = true;
  const W = 96, H = 60, DUR = 33000, MODE_MS = 2750;
  const IMG_MS = 9000;     // da qui in poi compaiono le immagini

  // immagini glitchate: joint al centro, foglie agli angoli
  const joint = new Image(); joint.src = '../img/joint.png';
  const leaf  = new Image(); leaf.src  = '../img/leaf.png';

  // chiedi al desktop di allargare la finestra a tutto schermo
  try{ parent.postMessage({ type: 'lzyyy-glitch', on: true }, '*'); }catch(err){}

  const ov = document.createElement('canvas');
  ov.width = W; ov.height = H;
  ov.style.cssText = 'position:fixed;inset:0;width:100vw;height:100vh;z-index:99;background:#000;image-rendering:pixelated';
  document.body.appendChild(ov);
  const g = ov.getContext('2d');
  g.imageSmoothingEnabled = false;     // pixel art nitida, niente lisciatura
  const img = g.createImageData(W, H);
  const d = img.data;

  // scritta sovrapposta, glitcha ogni ~700ms
  const label = document.createElement('div');
  label.style.cssText = "position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;" +
    "font-family:'VT323',monospace;font-size:36px;color:#fff;mix-blend-mode:difference;text-align:center;pointer-events:none";
  document.body.appendChild(label);
  const MSGS = ['[CORROTTO].PRJ', 'NON SPEGNERE', 'IL PROGETTO NON ESISTE',
    '0x4C5A5959', 'CHI HA SALVATO QUESTO FILE?', '▓▓▒▒░░▒▒▓▓', 'wtf', ''];
  const labelTimer = setInterval(() => {
    label.textContent = MSGS[Math.random() * MSGS.length | 0];
    label.style.transform = `skew(${(Math.random()*30-15)|0}deg) scale(${(0.7+Math.random()*1.4).toFixed(2)})`;
  }, 700);

  // hsv→rgb a piena saturazione (h in gradi)
  function ch(h, n){
    const k = (n + h / 60) % 6;
    return 255 * (1 - Math.max(0, Math.min(k, 4 - k, 1))) | 0;
  }
  // put(i,h,lum): pixel colorato in img — h tinta, lum 0..1
  function put(i, h, lum){
    const hh = (h % 360 + 360) % 360;
    d[i] = ch(hh, 5) * lum | 0; d[i+1] = ch(hh, 3) * lum | 0;
    d[i+2] = ch(hh, 1) * lum | 0; d[i+3] = 255;
  }

  /* — modalità glitch: una funzione per tipo — */
  // plasma: onde sinusoidali sovrapposte, tinta rotante
  function mPlasma(t){
    for(let i = 0, y = 0; y < H; y++) for(let x = 0; x < W; x++, i += 4){
      const v = Math.sin(x * .19 + t * 2.1) + Math.sin(y * .23 - t * 1.7) +
                Math.sin((x + y) * .11 + t * 2.9) +
                Math.sin(Math.hypot(x - W / 2, y - H / 2) * .3 - t * 3.4);
      put(i, v * 45 + t * 130, 1);
    }
    g.putImageData(img, 0, 0);
  }
  // statica: neve b/n mista a fosfori verdi
  function mStatic(){
    for(let i = 0; i < d.length; i += 4){
      if(Math.random() < .6){ const k = Math.random() * 255 | 0; d[i] = d[i+1] = d[i+2] = k; }
      else { d[i] = 40; d[i+1] = Math.random() * 255 | 0; d[i+2] = 40; }
      d[i+3] = 255;
    }
    g.putImageData(img, 0, 0);
  }
  // tunnel: anelli concentrici torti che risucchiano
  function mTunnel(t){
    for(let i = 0, y = 0; y < H; y++) for(let x = 0; x < W; x++, i += 4){
      const dx = x - W / 2, dy = y - H / 2;
      put(i, Math.hypot(dx, dy) * 16 - t * 280 + Math.atan2(dy, dx) * 80, 1);
    }
    g.putImageData(img, 0, 0);
  }
  // melt: il frame precedente cola in basso a colonne irregolari
  function mMelt(t){
    for(let x = 0; x < W; x += 4){
      const fall = 1 + (Math.random() * 3 | 0);
      g.drawImage(ov, x, 0, 4, H - fall, x, fall, 4, H - fall);
    }
    for(let n = 0; n < 12; n++){              // gocce nuove in alto
      g.fillStyle = `hsl(${(t * 120 + n * 30) % 360},100%,55%)`;
      g.fillRect(Math.random() * W | 0, 0, 2 + Math.random() * 6 | 0, 2);
    }
  }
  // barre: colonne colorate + banda di sync nera che scorre
  function mBars(t){
    for(let i = 0, y = 0; y < H; y++){
      const sync = ((y + t * 45) % H + H) % H < 5;
      for(let x = 0; x < W; x++, i += 4){
        if(sync){ d[i] = d[i+1] = d[i+2] = 0; d[i+3] = 255; continue; }
        put(i, x * 12 + t * 160, .5 + .5 * Math.sin(y * .4 + t * 7));
      }
    }
    g.putImageData(img, 0, 0);
  }
  // zigzag: strisce diagonali deformate a onda
  function mZigzag(t){
    for(let i = 0, y = 0; y < H; y++){
      const off = Math.sin(y * .3 + t * 5) * 18;
      for(let x = 0; x < W; x++, i += 4)
        put(i, (x + off) * 9 - t * 140, ((x + off + y) & 7) < 2 ? .25 : 1);
    }
    g.putImageData(img, 0, 0);
  }
  // pioggia: colonne fosforo che cadono su scia (stato persistente)
  const drops = Array.from({ length: 24 }, () =>
    ({ x: Math.random() * W, y: Math.random() * H, v: .5 + Math.random() }));
  function mRain(){
    g.fillStyle = 'rgba(0,0,0,.25)'; g.fillRect(0, 0, W, H);
    drops.forEach((p) => {
      g.fillStyle = '#d4f5a0'; g.fillRect(p.x | 0, p.y | 0, 1, 2);
      g.fillStyle = '#4a7a2a'; g.fillRect(p.x | 0, (p.y - 3) | 0, 1, 3);
      p.y += p.v * 2;
      if(p.y > H + 4){ p.y = -4; p.x = Math.random() * W; }
    });
  }
  // caleidoscopio: plasma specchiato sui due assi
  function mKaleido(t){
    for(let i = 0, y = 0; y < H; y++) for(let x = 0; x < W; x++, i += 4){
      const mx = Math.min(x, W - 1 - x), my = Math.min(y, H - 1 - y);
      const v = Math.sin(mx * .3 + t * 3) + Math.sin(my * .35 - t * 2.2) +
                Math.sin((mx + my) * .2 + t * 4);
      put(i, v * 60 + t * 150, 1);
    }
    g.putImageData(img, 0, 0);
  }
  // rgb-split: canali del frame precedente shiftati + righe di disturbo
  function mRGBSplit(t){
    const prev = g.getImageData(0, 0, W, H).data;
    const sh = ((2 + Math.sin(t * 6) * 3) | 0) * 4;
    const L = prev.length;
    for(let i = 0; i < L; i += 4){
      d[i]   = prev[(i + sh) % L];
      d[i+1] = prev[i + 1];
      d[i+2] = prev[((i - sh) % L + L) % L + 2];
      d[i+3] = 255;
    }
    g.putImageData(img, 0, 0);
    // splash di colore per non far morire il feedback
    g.fillStyle = `hsl(${(t * 240) % 360},100%,55%)`;
    g.fillRect(Math.random() * (W - 20) | 0, Math.random() * (H - 6) | 0, 20, 6);
  }
  // feedback: il frame rientra in se stesso zoomato e ruotato
  function mWarp(t){
    g.save();
    g.translate(W / 2, H / 2);
    g.rotate(.05 + .06 * Math.sin(t * 1.5));
    g.scale(1.08, 1.08);
    g.drawImage(ov, -W / 2, -H / 2);
    g.restore();
    // seme di colore in orbita al centro
    const a = t * 5;
    g.fillStyle = `hsl(${(t * 300) % 360},100%,55%)`;
    g.fillRect(W / 2 + Math.cos(a) * 10 | 0, H / 2 + Math.sin(a) * 8 | 0, 3, 3);
  }
  // moiré: interferenza di onde quadratiche ad alta frequenza
  function mMoire(t){
    for(let i = 0, y = 0; y < H; y++) for(let x = 0; x < W; x++, i += 4){
      const v = Math.sin(x * x * .015 + t * 4) * Math.sin(y * y * .02 - t * 3);
      put(i, v * 120 + t * 100, Math.abs(v));
    }
    g.putImageData(img, 0, 0);
  }
  // scacchiera: celle pulsanti a tinte complementari
  function mCheckers(t){
    const s = 6 + (Math.sin(t * 2) * 4 | 0);
    for(let i = 0, y = 0; y < H; y++) for(let x = 0; x < W; x++, i += 4){
      const k = ((x / s | 0) + (y / s | 0)) & 1;
      put(i, t * 200 + (k ? 180 : 0), k ? 1 : .8);
    }
    g.putImageData(img, 0, 0);
  }
  const MODES = [mPlasma, mStatic, mTunnel, mMelt, mBars, mRain,
                 mKaleido, mRGBSplit, mZigzag, mWarp, mMoire, mCheckers];

  /* fumo dal joint: particelle che salgono dalla punta (che ruota
     con lui), derivano a onda e svaniscono allargandosi */
  const smoke = [];
  function drawSmoke(rot){
    const off = 44 * .38;                        // brace: angolo in basso a destra
    const tx = W / 2 + off * Math.cos(rot) - off * Math.sin(rot);
    const ty = H / 2 + off * Math.sin(rot) + off * Math.cos(rot);
    for(let n = 0; n < 4; n++)
      smoke.push({ x: tx + (Math.random() * 3 - 1.5), y: ty, life: 1, ph: Math.random() * 6.28 });
    for(let i = smoke.length - 1; i >= 0; i--){
      const p = smoke[i];
      p.life -= .013;
      if(p.life <= 0){ smoke.splice(i, 1); continue; }
      p.y -= .5;
      p.x += Math.sin(p.ph + p.life * 9) * .6;
      const sz = p.life > .55 ? 2 : 3;       // si allarga svanendo
      g.fillStyle = `rgba(255,255,255,${(p.life * .95).toFixed(2)})`;
      g.fillRect(p.x | 0, p.y | 0, sz, sz);
    }
  }

  /* drawImgGlitched(im, cx, cy, size, rot, clean): immagine ruotata.
     clean=true → resa pulita (solo rotazione). Altrimenti glitch
     assurdi: jitter, scatti di scala, tinte casuali, inversioni,
     doppi fantasma in additive */
  function drawImgGlitched(im, cx, cy, size, rot, clean){
    if(!im.complete || !im.naturalWidth) return;
    const ar = im.naturalHeight / im.naturalWidth;   // proporzioni native
    g.save();
    g.translate(cx, cy);
    g.rotate(rot);
    if(clean){
      g.drawImage(im, -size / 2, -size * ar / 2, size, size * ar);
      g.restore();
      return;
    }
    const j = () => (Math.random() * 4 - 2) | 0;
    const r = Math.random();
    if(r < .25) g.filter = `hue-rotate(${Math.random()*360|0}deg) saturate(${2+Math.random()*6})`;
    else if(r < .4) g.filter = 'invert(1)';
    const s = size * (.85 + Math.random() * .4), sh = s * ar;
    g.globalAlpha = .9;
    g.drawImage(im, -s / 2 + j(), -sh / 2 + j(), s, sh);
    // fantasmi sdoppiati in additive
    g.globalCompositeOperation = 'lighter';
    g.globalAlpha = .3;
    g.filter = 'hue-rotate(120deg)';
    g.drawImage(im, -s / 2 + 2 + j(), -sh / 2, s, sh);
    g.filter = 'hue-rotate(240deg)';
    g.drawImage(im, -s / 2 - 2, -sh / 2 + j(), s, sh);
    g.restore();
  }

  const t0 = performance.now();
  function frame(now){
    const t = (now - t0) / 1000;
    if(now - t0 >= DUR) return end();
    const slot = Math.floor((now - t0) / MODE_MS);
    // immagini: prima finestra pulita e sopra tutto, poi glitchate
    // prima della corruzione (così blocchi/tearing le spezzano)
    const imgsOn = now - t0 >= IMG_MS;
    const clean = now - t0 < IMG_MS + 12000;
    // slot pari pixelati, dispari lisci — ma con le immagini pulite
    // a schermo resta sempre pixelato (la pixel art non va lisciata)
    ov.style.imageRendering = (imgsOn && clean) || slot % 2 === 0 ? 'pixelated' : 'auto';
    MODES[slot % MODES.length](t);
    function drawImgs(){
      drawImgGlitched(joint, W / 2, H / 2, 44, t * 1.4, clean);
      drawSmoke(t * 1.4);
      const lr = t * 2.6;
      drawImgGlitched(leaf, 10,     8,     18,  lr, clean);
      drawImgGlitched(leaf, W - 10, 8,     18, -lr, clean);
      drawImgGlitched(leaf, 10,     H - 8, 18, -lr, clean);
      drawImgGlitched(leaf, W - 10, H - 8, 18,  lr, clean);
    }
    if(imgsOn && !clean) drawImgs();

    // corruzione a blocchi su qualunque modalità
    for(let n = 0; n < 5; n++){
      const bw = 8 + Math.random() * 30 | 0, bh = 3 + Math.random() * 12 | 0;
      g.drawImage(ov, Math.random()*(W-bw)|0, Math.random()*(H-bh)|0, bw, bh,
                      Math.random()*(W-bw)|0, Math.random()*(H-bh)|0, bw, bh);
    }
    // tearing nelle modalità lisce
    if(slot % 2 === 1){
      for(let n = 0; n < 8; n++){
        const y = Math.random() * H | 0;
        g.drawImage(ov, 0, y, W, 1, Math.sin(t * 9 + y) * 14 | 0, y, W, 1);
      }
    }
    if(imgsOn && clean) drawImgs();
    requestAnimationFrame(frame);
  }

  function end(){
    clearInterval(labelTimer);
    ov.remove(); label.remove();
    corruptRunning = false;
    try{ parent.postMessage({ type: 'lzyyy-glitch', on: false }, '*'); }catch(err){}
    print('&nbsp;');
    print('[CORROTTO].prj — esecuzione terminata. 33.0s', 'am');
    print('ERRORE: memoria di sistema compromessa', 'err');
    // crash di sistema: lo mostra il desktop; standalone → fallback locale
    setTimeout(() => {
      if(window.parent !== window){
        try{ parent.postMessage({ type: 'lzyyy-crash' }, '*'); }catch(err){}
      } else {
        localCrash();
      }
    }, 1500);
  }
  requestAnimationFrame(frame);
}

/* localCrash(): errore fatale quando il terminale gira da solo
   (senza desktop): overlay nero + riavvio al primo input */
function localCrash(){
  if(document.getElementById('crash-local')) return;
  const el = document.createElement('div');
  el.id = 'crash-local';
  el.style.cssText = 'position:fixed;inset:0;z-index:9999;background:#0c0c0b;color:var(--ph);' +
    "display:flex;align-items:center;justify-content:center;font-family:'Share Tech Mono',monospace;" +
    'font-size:14px;line-height:1.9;cursor:crosshair;text-shadow:0 0 4px rgba(212,245,160,.55)';
  el.innerHTML = '<div style="max-width:560px;padding:24px">' +
    '<span style="background:var(--ph);color:#0c0c0b;padding:2px 10px;text-shadow:none">*** ERRORE FATALE ***</span><br><br>' +
    'LZYYY_SYS — eccezione 0x4C5A5959 in [CORROTTO].PRJ<br>' +
    'la memoria di sistema è stata compromessa.<br><br>' +
    'è necessario riavviare il sistema.<br><br>' +
    'premi un tasto o tocca lo schermo per riavviare</div>';
  document.body.appendChild(el);
  const reboot = () => location.reload();
  setTimeout(() => {
    window.addEventListener('keydown', reboot, { once: true });
    el.addEventListener('pointerdown', reboot, { once: true });
  }, 1200);
}

  /* avvio diretto del glitch di [CORROTTO].prj (comando nascosto) */
  glitch(){
    print('avvio manuale di [CORROTTO].prj…', 'err');
    setTimeout(runCorrupt, 600);
  },
  exit(){ print('non si esce da LZYYY_SYS.', 'dim'); },
  /* EE-05: comando segreto → messaggio + audio nascosto */
  secret(){
    print('…', 'dim');
    setTimeout(() => print('0x4C5A5959 — canale nascosto aperto', 'am'), 350);
    setTimeout(() => {
      print('questo suono non è mai uscito da questa stanza.');
      print('ascolta. poi dimentica.', 'dim');
      playSecretDrone();

  },
};

/* run(line): parse + dispatch di una riga */
function run(line){
  print(`<span class="dim">lzyyy@LZYYY_SYS:~$</span> ${esc(line)}`);
  const parts = line.trim().split(/\s+/);
  const name = (parts.shift() || '').toLowerCase();
  if(!name) return;
  if(line.trim() === 'rm -rf /') return fakeMeltdown();
  if(COMMANDS[name]) return COMMANDS[name](parts);
  print(`comando sconosciuto: ${esc(name)} · prova <span class="am">help</span>`, 'err');
}

/* input: invio esegue, frecce scorrono la cronologia */
const history = [];
let hIdx = -1;

/* submit(): esegue la riga corrente e la archivia in cronologia */
function submit(){
  const line = cmd.value;
  if(line.trim()){ history.unshift(line); hIdx = -1; }
  cmd.value = '';
  run(line);
}

cmd.addEventListener('keydown', (e) => {
  if(e.key === 'Enter'){
    submit();
  } else if(e.key === 'ArrowUp'){
    e.preventDefault();
    if(hIdx < history.length - 1) cmd.value = history[++hIdx];
  } else if(e.key === 'ArrowDown'){
    e.preventDefault();
    cmd.value = hIdx > 0 ? history[--hIdx] : (hIdx = -1, '');
  }
});

/* =========================================================
   TASTIERA VIRTUALE — tasti generati da KBD_ROWS.
   Formato voce: 'label' (carattere) oppure 'label:AZIONE'.
   ========================================================= */
const kbd = document.getElementById('kbd');
const kbdToggle = document.getElementById('kbd-toggle');

/* su touch l'input non apre mai la tastiera nativa: si usa solo quella virtuale */
const TOUCH = window.matchMedia('(pointer: coarse)').matches;
if(TOUCH) cmd.setAttribute('inputmode', 'none');
const KBD_ROWS = [
  ['1','2','3','4','5','6','7','8','9','0','⌫:BKSP'],
  ['q','w','e','r','t','y','u','i','o','p','-'],
  ['a','s','d','f','g','h','j','k','l','.','/'],
  ['↑:HIST','z','x','c','v','b','n','m','↵:ENTER'],
  ['SPACE:SPACE'],
];

/* buildKbd(): crea le righe di tasti dentro #kbd */
function buildKbd(){
  KBD_ROWS.forEach((row) => {
    const r = document.createElement('div');
    r.className = 'krow';
    row.forEach((entry) => {
      const [label, action] = entry.split(':');
      const b = document.createElement('button');
      b.textContent = label;
      b.dataset.k = action || label;
      if(action) b.classList.add(action === 'SPACE' ? 'wide' : 'sp');
      if(action === 'ENTER') b.classList.add('enter');
      r.appendChild(b);
    });
    kbd.appendChild(r);
  });
}
buildKbd();

/* pressione tasto virtuale: scrive nell'input o esegue l'azione */
kbd.addEventListener('pointerdown', (e) => {
  const b = e.target.closest('button');
  if(!b) return;
  e.preventDefault();           // non ruba il focus all'input
  const k = b.dataset.k;
  if(k === 'BKSP') cmd.value = cmd.value.slice(0, -1);
  else if(k === 'ENTER') submit();
  else if(k === 'SPACE') cmd.value += ' ';
  else if(k === 'HIST'){ if(hIdx < history.length - 1) cmd.value = history[++hIdx]; }
  else cmd.value += k;
});
/* il tap sulla tastiera non deve far comparire quella nativa mobile */
kbd.addEventListener('pointerup', (e) => e.stopPropagation());

/* setKbd(visible): mostra/nasconde la tastiera e aggiorna il toggle.
   Aperta → X per chiudere · chiusa → ⌨ per riaprire */
function setKbd(visible){
  kbd.classList.toggle('hidden', !visible);
  kbdToggle.classList.toggle('on', visible);
  kbdToggle.textContent = visible ? 'X' : '⌨';
}
setKbd(true);

/* toggle: mostra/nasconde la tastiera virtuale */
kbdToggle.addEventListener('pointerup', (e) => {
  e.stopPropagation();
  setKbd(kbd.classList.contains('hidden'));
});

/* su touch, tap sull'input con tastiera virtuale chiusa → riaprila */
cmd.addEventListener('pointerup', () => {
  if(TOUCH && kbd.classList.contains('hidden')) setKbd(true);
});

/* tap/click ovunque → focus sull'input (apre la tastiera su mobile) */
document.body.addEventListener('pointerup', () => cmd.focus());

/* benvenuto */
print('LZYYY_SYS terminal v0.7 — shell instabile', 'dim');
print('digita <span class="am">help</span> per i comandi.', 'dim');
print('&nbsp;');
cmd.focus();
</script>
