<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TERMINAL</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
/* =========================================================
   TERMINAL — app standalone (iframe). Comandi fake + EE-05.
   ========================================================= */
:root{
  --white:#f0ede8; --grey-l:#c8c3bc; --grey-m:#8a857e; --grey-d:#3a3732;
  --black:#111010; --ph:#d4f5a0; --am:#ffcc44; --panel:#1c1a17;
  --glow-ph:0 0 4px rgba(212,245,160,.55);
  --glow-am:0 0 4px rgba(255,204,68,.55);
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{
  background:#0c0c0b; color:var(--ph);
  font-family:'Share Tech Mono',monospace; font-size:13px;
  cursor:crosshair; overflow:hidden;
  display:flex; flex-direction:column;
  -webkit-tap-highlight-color:transparent;
}
/* scanline leggera su tutto il terminale */
body::after{
  content:''; position:fixed; inset:0; pointer-events:none; z-index:9;
  background:repeating-linear-gradient(to bottom, rgba(0,0,0,0) 0 2px, rgba(0,0,0,.18) 3px);
}

#out{
  flex:1; overflow-y:auto; padding:10px 12px;
  line-height:1.45; white-space:pre-wrap; word-break:break-word;
  text-shadow:var(--glow-ph);
}
#out .dim{ color:var(--grey-m); text-shadow:none; }
#out .am{ color:var(--am); text-shadow:var(--glow-am); }
#out .err{ color:#ff6b5e; text-shadow:0 0 4px rgba(255,107,94,.5); }
#out a{ color:var(--am); text-shadow:var(--glow-am); }

/* riga input: prompt + campo reale (porta su la tastiera mobile) */
#in-row{
  flex-shrink:0; display:flex; align-items:center; gap:6px;
  padding:6px 12px 8px; border-top:1px solid rgba(138,133,126,.25);
}
#in-row .pr{ color:var(--am); text-shadow:var(--glow-am); white-space:nowrap; }
#cmd{
  flex:1; min-width:0; background:transparent; border:0; outline:0;
  color:var(--ph); text-shadow:var(--glow-ph);
  font-family:'Share Tech Mono',monospace; font-size:13px;
  caret-color:var(--am); cursor:crosshair;
}
/* toggle tastiera virtuale */
#kbd-toggle{
  flex-shrink:0; background:transparent; border:1px solid rgba(138,133,126,.4);
  color:var(--grey-m); font-family:'Share Tech Mono',monospace; font-size:13px;
  padding:1px 7px; cursor:crosshair;
}
#kbd-toggle.on{ color:var(--am); border-color:var(--am); text-shadow:var(--glow-am); }

/* tastiera virtuale on-screen */
#kbd{
  flex-shrink:0; background:var(--panel); padding:6px 6px 8px;
  border-top:1px solid rgba(138,133,126,.25); user-select:none;
}
#kbd.hidden{ display:none; }
#kbd .krow{ display:flex; gap:4px; justify-content:center; margin-top:4px; }
#kbd .krow:first-child{ margin-top:0; }
#kbd button{
  flex:1; max-width:42px; min-width:0; padding:7px 0;
  background:#14120f; border:1px solid rgba(138,133,126,.45);
  color:var(--ph); text-shadow:var(--glow-ph);
  font-family:'Share Tech Mono',monospace; font-size:13px;
  cursor:crosshair; touch-action:manipulation;
}
#kbd button.sp{ color:var(--am); text-shadow:var(--glow-am); max-width:64px; }
#kbd button.wide{ max-width:none; flex:5; }
#kbd button.enter{ flex:2.5; max-width:110px; }
#kbd button:active{ background:var(--ph); color:var(--black); text-shadow:none; }
/* tastiera virtuale solo su touch: su desktop c'è quella fisica */
@media (pointer: fine){
  #kbd, #kbd-toggle{ display:none; }
}

::-webkit-scrollbar{ width:8px; }
::-webkit-scrollbar-track{ background:#0c0c0b; }
::-webkit-scrollbar-thumb{ background:var(--grey-m); border:1px solid var(--black); }

@media (max-width:480px){
  body{ font-size:12px; }
  #cmd{ font-size:16px; }   /* <16px su iOS zooma la pagina al focus */
}
</style>
</head>
<body>

<div id="out"></div>
<div id="in-row">
  <span class="pr">lzyyy@LZYYY_SYS:~$</span>
  <input id="cmd" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false">
  <button id="kbd-toggle" class="on" title="tastiera on-screen">⌨</button>
</div>
<div id="kbd"></div>

<script>
/* =========================================================
   TERMINAL — interprete comandi fake
   ========================================================= */
const SPOTIFY = 'https://open.spotify.com/artist/2YYiyxIraQIGFYQUImQzk0';
const out = document.getElementById('out');
const cmd = document.getElementById('cmd');

/* print(html, cls): aggiunge una riga al log e scrolla in fondo */
function print(html, cls){
  const d = document.createElement('div');
  if(cls) d.className = cls;
  d.innerHTML = html;
  out.appendChild(d);
  out.scrollTop = out.scrollHeight;
}
/* esc(s): escape HTML dell'input utente */
function esc(s){
  return String(s).replace(/[&<>"]/g, (c) =>
    ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;' }[c]));
}

/* --- file system finto per ls/cat --- */
const FILES = {
  'README.txt':      'ho sampleato un ventilatore per 6 ore. nessun rimpianto.',
  'todo.txt':        '1. finire l\'album\n2. non finire l\'album\n3. boh',
  'password.txt':    'bella prova.',
};

/* --- tracce reali → file .wav (sorgente viva: data/discography.json) --- */
const FALLBACK_PROJECTS = [
  { name:'#FFFFFF', type:'album', date:'2026-03-13',
    tracks:[
      { name:'<grz>', ms:133718, url:'https://open.spotify.com/track/2QiqQWyhN6EJkmD9yKe3aV' },
      { name:'mare', ms:168348, url:'https://open.spotify.com/track/5pCCUb0VwCIFR7ffyhlOWx' },
      { name:'987', ms:223741, url:'https://open.spotify.com/track/4UihCMqZ8LZ3EgaeulpdZd' },
      { name:'sanguini', ms:169495, url:'https://open.spotify.com/track/47X0Elw50hDXurjfcggfVs' },
      { name:'non è un interludio(interludio)', ms:252415, url:'https://open.spotify.com/track/3jDx4C0RoIPFW2LDNBdNhg' },
      { name:'cura_)', ms:119687, url:'https://open.spotify.com/track/4CYM7aEsVioKp2QZ2oIVH6' },
      { name:'Matematica', ms:167191, url:'https://open.spotify.com/track/4FasIwPeaFlUAEDborcmtp' },
      { name:'<\\bestia>', ms:222843, url:'https://open.spotify.com/track/2bTRIQSTiT2CRexGycuZCb' },
    ]},
  { name:'Non c’è pace', type:'single', date:'2025-10-31',
    tracks:[ { name:'Non c\'è pace', ms:152816, url:'https://open.spotify.com/track/3cKZtd1cI9N5sVMofMFfJS' } ]},
];

/* slug(name): nome traccia → nome file digitabile dalla tastiera
   virtuale (minuscole, niente accenti né simboli) */
function slug(name){
  return name.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '')
    .replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '') + '.wav';
}
/* dur(ms): ms → m:ss */
function dur(ms){
  const s = Math.round(ms / 1000);
  return Math.floor(s / 60) + ':' + String(s % 60).padStart(2, '0');
}
/* mountTracks(projects): monta le tracce in FILES come { meta, url } */
function mountTracks(projects){
  projects.forEach((p) => p.tracks.forEach((t) => {
    FILES[slug(t.name)] = {
      meta: `${t.name}\nprogetto: ${p.name} (${p.type}, ${p.date})\ndurata: ${dur(t.ms)} · dim: ${t.ms % 847} TB · mono emotivo`,
      url: t.url,
    };
  }));
}
mountTracks(FALLBACK_PROJECTS);
fetch('../data/discography.json')
  .then((r) => r.json())
  .then((d) => mountTracks(d.projects))
  .catch(() => {});

/* --- audio nascosto per `secret` (EE-05): drone generato --- */
let actx = null;
function playSecretDrone(){
  if(!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
  actx.resume();
  const now = actx.currentTime, DUR = 6;
  const g = actx.createGain();
  g.gain.setValueAtTime(0.0001, now);
  g.gain.linearRampToValueAtTime(0.18, now + 1.2);
  g.gain.linearRampToValueAtTime(0.0001, now + DUR);
  g.connect(actx.destination);
  // tre oscillatori leggermente scordati = pad inquietante
  [55, 55.7, 110.4].forEach((f) => {
    const o = actx.createOscillator();
    o.type = 'sawtooth'; o.frequency.value = f;
    const lp = actx.createBiquadFilter();
    lp.type = 'lowpass'; lp.frequency.value = 320;
    o.connect(lp); lp.connect(g);
    o.start(now); o.stop(now + DUR);
  });
}

/* --- EE rm -rf: pioggia di errori finti, poi rientro --- */
function fakeMeltdown(){
  let n = 0;
  const t = setInterval(() => {
    print(`E: settore 0x${(Math.random()*0xFFFF|0).toString(16).padStart(4,'0')} — IL DISCO URLA`, 'err');
    if(++n >= 14){
      clearInterval(t);
      print('&nbsp;');
      print('scherzavo. niente è stato cancellato.', 'am');
      print('(il disco però urla davvero)', 'dim');
    }
  }, 90);
}

/* --- tabella comandi: nome → funzione(args) --- */
const COMMANDS = {
  help(){
    print('comandi disponibili:', 'dim');
    print('  <span class="am">help</span>      questa lista\n' +
          '  <span class="am">whoami</span>    chi sei\n' +
          '  <span class="am">ls</span>        elenca file\n' +
          '  <span class="am">cat</span> &lt;file&gt;  leggi un file\n' +
          '  <span class="am">play</span>      apri spotify\n' +
          '  <span class="am">date</span>      data di sistema\n' +
          '  <span class="am">echo</span> &lt;txt&gt;  ripeti\n' +
          '  <span class="am">clear</span>     pulisci lo schermo');
    print('(non è la lista completa)', 'dim');
  },
  whoami(){ print('lazyyy. wtf.'); },
  ls(){ print(Object.keys(FILES).join('\n')); },
  cat(args){
    const f = args.join(' ');
    if(!f) return print('cat: serve un nome file', 'err');
    // match case-insensitive: la tastiera virtuale ha solo minuscole
    const key = Object.keys(FILES).find((k) => k.toLowerCase() === f.toLowerCase());
    if(!key) return print(`cat: ${esc(f)}: file inesistente (o nascosto)`, 'err');
    const v = FILES[key];
    if(typeof v === 'string') return print(esc(v));
    // traccia reale: metadata fake + apertura spotify
    print(esc(v.meta));
    print(`▶ apertura spotify… <a href="${v.url}" target="_blank" rel="noopener">link manuale</a>`);
    window.open(v.url, '_blank', 'noopener');
  },
  play(){
    print(`▶ apertura spotify… <a href="${SPOTIFY}" target="_blank" rel="noopener">link manuale</a>`);
    window.open(SPOTIFY, '_blank', 'noopener');
  },
  date(){
    // l'OS è convinto di essere nel 1987
    const d = new Date();
    print(`${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')} · 1987-03-14 <span class="dim">(orologio di sistema non sincronizzato)</span>`);
  },
  echo(args){ print(esc(args.join(' ')) || '&nbsp;'); },
  clear(){ out.innerHTML = ''; },
  sudo(){ print('no.', 'am'); },
  exit(){ print('non si esce da LZYYY_SYS.', 'dim'); },
  /* EE-05: comando segreto → messaggio + audio nascosto */
  secret(){
    print('…', 'dim');
    setTimeout(() => print('0x4C5A5959 — canale nascosto aperto', 'am'), 350);
    setTimeout(() => {
      print('questo suono non è mai uscito da questa stanza.');
      print('ascolta. poi dimentica.', 'dim');
      playSecretDrone();
    }, 800);
  },
};

/* run(line): parse + dispatch di una riga */
function run(line){
  print(`<span class="dim">lzyyy@LZYYY_SYS:~$</span> ${esc(line)}`);
  const parts = line.trim().split(/\s+/);
  const name = (parts.shift() || '').toLowerCase();
  if(!name) return;
  if(line.trim() === 'rm -rf /') return fakeMeltdown();
  if(COMMANDS[name]) return COMMANDS[name](parts);
  print(`comando sconosciuto: ${esc(name)} · prova <span class="am">help</span>`, 'err');
}

/* input: invio esegue, frecce scorrono la cronologia */
const history = [];
let hIdx = -1;

/* submit(): esegue la riga corrente e la archivia in cronologia */
function submit(){
  const line = cmd.value;
  if(line.trim()){ history.unshift(line); hIdx = -1; }
  cmd.value = '';
  run(line);
}

cmd.addEventListener('keydown', (e) => {
  if(e.key === 'Enter'){
    submit();
  } else if(e.key === 'ArrowUp'){
    e.preventDefault();
    if(hIdx < history.length - 1) cmd.value = history[++hIdx];
  } else if(e.key === 'ArrowDown'){
    e.preventDefault();
    cmd.value = hIdx > 0 ? history[--hIdx] : (hIdx = -1, '');
  }
});

/* =========================================================
   TASTIERA VIRTUALE — tasti generati da KBD_ROWS.
   Formato voce: 'label' (carattere) oppure 'label:AZIONE'.
   ========================================================= */
const kbd = document.getElementById('kbd');
const kbdToggle = document.getElementById('kbd-toggle');

/* su touch l'input non apre mai la tastiera nativa: si usa solo quella virtuale */
const TOUCH = window.matchMedia('(pointer: coarse)').matches;
if(TOUCH) cmd.setAttribute('inputmode', 'none');
const KBD_ROWS = [
  ['1','2','3','4','5','6','7','8','9','0','⌫:BKSP'],
  ['q','w','e','r','t','y','u','i','o','p','-'],
  ['a','s','d','f','g','h','j','k','l','.','/'],
  ['↑:HIST','z','x','c','v','b','n','m','↵:ENTER'],
  ['SPACE:SPACE'],
];

/* buildKbd(): crea le righe di tasti dentro #kbd */
function buildKbd(){
  KBD_ROWS.forEach((row) => {
    const r = document.createElement('div');
    r.className = 'krow';
    row.forEach((entry) => {
      const [label, action] = entry.split(':');
      const b = document.createElement('button');
      b.textContent = label;
      b.dataset.k = action || label;
      if(action) b.classList.add(action === 'SPACE' ? 'wide' : 'sp');
      if(action === 'ENTER') b.classList.add('enter');
      r.appendChild(b);
    });
    kbd.appendChild(r);
  });
}
buildKbd();

/* pressione tasto virtuale: scrive nell'input o esegue l'azione */
kbd.addEventListener('pointerdown', (e) => {
  const b = e.target.closest('button');
  if(!b) return;
  e.preventDefault();           // non ruba il focus all'input
  const k = b.dataset.k;
  if(k === 'BKSP') cmd.value = cmd.value.slice(0, -1);
  else if(k === 'ENTER') submit();
  else if(k === 'SPACE') cmd.value += ' ';
  else if(k === 'HIST'){ if(hIdx < history.length - 1) cmd.value = history[++hIdx]; }
  else cmd.value += k;
});
/* il tap sulla tastiera non deve far comparire quella nativa mobile */
kbd.addEventListener('pointerup', (e) => e.stopPropagation());

/* setKbd(visible): mostra/nasconde la tastiera e aggiorna il toggle.
   Aperta → X per chiudere · chiusa → ⌨ per riaprire */
function setKbd(visible){
  kbd.classList.toggle('hidden', !visible);
  kbdToggle.classList.toggle('on', visible);
  kbdToggle.textContent = visible ? 'X' : '⌨';
}
setKbd(true);

/* toggle: mostra/nasconde la tastiera virtuale */
kbdToggle.addEventListener('pointerup', (e) => {
  e.stopPropagation();
  setKbd(kbd.classList.contains('hidden'));
});

/* su touch, tap sull'input con tastiera virtuale chiusa → riaprila */
cmd.addEventListener('pointerup', () => {
  if(TOUCH && kbd.classList.contains('hidden')) setKbd(true);
});

/* tap/click ovunque → focus sull'input (apre la tastiera su mobile) */
document.body.addEventListener('pointerup', () => cmd.focus());

/* benvenuto */
print('LZYYY_SYS terminal v0.7 — shell instabile', 'dim');
print('digita <span class="am">help</span> per i comandi.', 'dim');
print('&nbsp;');
cmd.focus();
</script>
</body>
</html>
