<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FILE_MGR</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=VT323&family=Orbitron:wght@400;700&family=IBM+Plex+Mono:wght@400;500&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
/* =========================================================
   FILE_MGR — app standalone (iframe). Albero navigabile.
   Cartelle utente standard; progetti reali sotto Desktop/.
   ========================================================= */
:root{
  --white:#f0ede8; --offwhite:#e2ddd6; --grey-l:#c8c3bc;
  --grey-m:#8a857e; --grey-d:#3a3732; --black:#111010;
  --ph:#d4f5a0; --am:#ffcc44; --panel:#1c1a17;
  --glow-ph:0 0 4px rgba(212,245,160,.55);
  --glow-am:0 0 4px rgba(255,204,68,.55);
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{
  background:var(--panel); color:var(--grey-l);
  font-family:'IBM Plex Mono',monospace; font-size:13px;
  cursor:crosshair; user-select:none; overflow:hidden;
  display:flex; flex-direction:column;
  -webkit-tap-highlight-color:transparent;
}
.fm-toolbar{
  display:flex; align-items:center; gap:10px;
  height:26px; padding:0 8px;
  background:#0f0e0c; border-bottom:1px solid var(--grey-m);
  font-family:'Share Tech Mono',monospace; font-size:12px;
}
.fm-toolbar .path{ color:var(--ph); text-shadow:var(--glow-ph); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.fm-toolbar .up{
  color:var(--am); cursor:crosshair; padding:0 4px;
  border:1px solid var(--grey-m);
}
.fm-toolbar .up:hover{ background:rgba(255,204,68,.15); }

.fm-main{ flex:1; display:flex; min-height:0; }

.fm-tree{
  width:160px; flex-shrink:0;
  background:#161512; border-right:1px solid var(--grey-m);
  padding:8px 0; overflow:auto;
  font-family:'Share Tech Mono',monospace; font-size:12px;
}
.fm-tree .node{
  padding:3px 10px; cursor:crosshair; white-space:nowrap;
  color:var(--grey-l); overflow:hidden; text-overflow:ellipsis;
}
.fm-tree .node:hover{ background:rgba(212,245,160,.10); }
.fm-tree .node.active{
  background:rgba(255,204,68,.15); color:var(--am); text-shadow:var(--glow-am);
}

.fm-list{ flex:1; overflow:auto; }
.fm-row{
  display:grid;
  grid-template-columns:1fr 64px 96px 36px;
  gap:8px; align-items:center;
  padding:4px 10px; white-space:nowrap;
  border-bottom:1px solid rgba(138,133,126,.18);
  cursor:crosshair;
}
.fm-row.head{
  position:sticky; top:0; z-index:1;
  background:#0f0e0c; color:var(--grey-m);
  font-family:'Share Tech Mono',monospace; font-size:11px;
  letter-spacing:1px; cursor:default;
}
.fm-row:not(.head):hover{ background:rgba(212,245,160,.10); }
.fm-row.selected{ background:rgba(255,204,68,.16); }
.fm-row .nm{ overflow:hidden; text-overflow:ellipsis; }
.fm-row .nm .ic{ margin-right:6px; }
.fm-row .col{ color:var(--grey-m); font-size:11px;
  font-family:'Share Tech Mono',monospace; }
.fm-row .go{ text-align:center; color:var(--grey-m); }
.fm-row.corrupt .nm{ color:#ff6b5e; }
.fm-row.song .nm{ color:var(--ph); text-shadow:var(--glow-ph); }
.fm-row.song:hover .nm{ text-decoration:underline; }
.fm-row.song:hover .go{ color:var(--am); text-shadow:var(--glow-am); }
.fm-row.folder .nm, .fm-row.project .nm{ color:var(--white); }

.fm-status{
  height:22px; flex-shrink:0;
  display:flex; align-items:center; justify-content:space-between;
  padding:0 10px; gap:12px;
  background:#0f0e0c; border-top:1px solid var(--grey-m);
  font-family:'Share Tech Mono',monospace; font-size:11px;
  color:var(--grey-m);
}
.fm-status .warn{ color:var(--am); text-shadow:var(--glow-am); }

/* Mobile: albero nascosto (si naviga da lista + ".."), niente colonna DATA,
   righe più alte per il tocco */
@media (max-width:480px){
  .fm-tree{ display:none; }
  .fm-row{ grid-template-columns:1fr 64px 28px; gap:6px; padding:8px 10px; }
  .fm-row > span:nth-child(3){ display:none; }
  .fm-toolbar .up{ padding:2px 10px; }
}

::-webkit-scrollbar{ width:8px; height:8px; }
::-webkit-scrollbar-track{ background:var(--panel); }
::-webkit-scrollbar-thumb{ background:var(--grey-m); border:1px solid var(--black); }
</style>
</head>
<body>

<div class="fm-toolbar">
  <span class="up" id="fm-up" title="cartella superiore">..</span>
  <span class="path" id="fm-path">/</span>
</div>

<div class="fm-main">
  <div class="fm-tree" id="fm-tree"></div>
  <div class="fm-list" id="fm-list"></div>
</div>

<div class="fm-status">
  <span id="fm-count">0 oggetti</span>
  <span class="warn">disco 0x4C5A · fs montato</span>
</div>

<script>
/* =========================================================
   FILE_MGR — dati + logica ad albero
   ========================================================= */

/* Snapshot di fallback (sorgente viva: data/discography.json) */
let PROJECTS = [
  { name:'#FFFFFF', type:'album', date:'2026-03-13', url:'https://open.spotify.com/album/658biHmHfCpxZBAhyOf8F6',
    tracks:[
      { name:'<grz>', ms:133718, url:'https://open.spotify.com/track/2QiqQWyhN6EJkmD9yKe3aV' },
      { name:'mare', ms:168348, url:'https://open.spotify.com/track/5pCCUb0VwCIFR7ffyhlOWx' },
      { name:'987', ms:223741, url:'https://open.spotify.com/track/4UihCMqZ8LZ3EgaeulpdZd' },
      { name:'sanguini', ms:169495, url:'https://open.spotify.com/track/47X0Elw50hDXurjfcggfVs' },
      { name:'non è un interludio(interludio)', ms:252415, url:'https://open.spotify.com/track/3jDx4C0RoIPFW2LDNBdNhg' },
      { name:'cura_)', ms:119687, url:'https://open.spotify.com/track/4CYM7aEsVioKp2QZ2oIVH6' },
      { name:'Matematica', ms:167191, url:'https://open.spotify.com/track/4FasIwPeaFlUAEDborcmtp' },
      { name:'<\\bestia>', ms:222843, url:'https://open.spotify.com/track/2bTRIQSTiT2CRexGycuZCb' },
    ]},
  { name:'Non c’è pace', type:'single', date:'2025-10-31', url:'https://open.spotify.com/album/3fPoyV85DIW2mqdkY49sNG',
    tracks:[ { name:'Non c\'è pace', ms:152816, url:'https://open.spotify.com/track/3cKZtd1cI9N5sVMofMFfJS' } ]},
];

let TREE = [];      // albero corrente
let path = [];      // percorso corrente (array di nomi), [] = radice

/* Touch: tap singolo apre (niente doppio click su mobile) */
const COARSE = window.matchMedia('(pointer:coarse)').matches;

const ICON = { folder:'▸', project:'💿', song:'♪', file:'▤', img:'▢', video:'▷', sample:'◈', corrupt:'⚠' };

const treeEl  = document.getElementById('fm-tree');
const listEl  = document.getElementById('fm-list');
const pathEl  = document.getElementById('fm-path');
const countEl = document.getElementById('fm-count');

/* --- stato cestino condiviso col terminale (sessionStorage,
       vive fino alla chiusura del tab) --- */
function normName(s){ return String(s).toLowerCase().replace(/[^a-z0-9.]/g, ''); }
function getRestored(){
  try{ return JSON.parse(sessionStorage.getItem('lzyyy-restored')) || []; }
  catch(err){ return []; }
}
/* contenuto del cestino: i restore fatti nel terminale spostano
   il file in Download finché il tab resta aperto */
const CESTINO = [
  { name:'[CORROTTO].prj',              kind:'corrupt', dim:'-1 B',  date:'0000-00-00' },
  { name:'demo_v9_DEFINITIVO_vero.wav', kind:'corrupt', dim:'NaN',   date:'1990-01-01' },
];

/* esc(s): escape HTML (nomi tipo <grz> contengono < >) */
function esc(s){
  return String(s).replace(/[&<>"]/g, (c) =>
    ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;' }[c]));
}
/* ms → m:ss */
function dur(ms){
  const s = Math.round(ms/1000);
  return Math.floor(s/60) + ':' + String(s%60).padStart(2,'0');
}

/* projectsToNodes(): progetti → cartelle con tracce dentro */
function projectsToNodes(projects){
  return projects.map(p => ({
    name:p.name, kind:'project', date:p.date, type:p.type, url:p.url,
    children: p.tracks.map((t,i) => ({
      name:`${String(i+1).padStart(2,'0')}  ${t.name}.wav`,
      kind:'song', ms:t.ms, url:t.url, date:p.date,
    })),
  }));
}

/* buildTree(): cartelle utente standard. I progetti vanno in Desktop.
   Il Cestino rispetta i restore fatti dal terminale. */
function buildTree(){
  const restored  = getRestored();
  const inTrash   = CESTINO.filter((n) => !restored.includes(normName(n.name)));
  const recovered = CESTINO.filter((n) =>  restored.includes(normName(n.name)));
  TREE = [
    { name:'Desktop',  kind:'folder', children: projectsToNodes(PROJECTS) },
    { name:'Download',  kind:'folder', children:[
      { name:'sample_pack_847.zip', kind:'corrupt', dim:'847 TB', date:'1987-03-14' },
      { name:'ventilatore_6h.wav',  kind:'sample',  dim:'6.0 GB', date:'1984-08-08' },
      { name:'frigo_3am.wav',       kind:'sample',  dim:'333 MB', date:'2003-03-03' },
      ...recovered,
    ]},
    { name:'Documenti', kind:'folder', children:[
      { name:'README.txt',          kind:'file', dim:'1.2 KB', date:'1987-03-14' },
      { name:'note_su_FFFFFF.txt',  kind:'file', dim:'0.4 KB', date:'2026-03-13' },
    ]},
    { name:'Immagini',  kind:'folder', children:[
      { name:'cover_#FFFFFF.png', kind:'img', dim:'#FFFFFF', date:'2026-03-13' },
      { name:'me_irl.jpg',        kind:'img', dim:'0 x 0',  date:'????-??-??' },
    ]},
    { name:'Video',     kind:'folder', children:[
      { name:'live_glitch.mp4', kind:'video', dim:'∞', date:'2025-01-01' },
    ]},
    { name:'Cestino',   kind:'folder', children: inTrash },
  ];
}

/* restore dal terminale mentre il file manager è aperto:
   l'evento storage arriva dagli altri iframe dello stesso tab */
window.addEventListener('storage', (e) => {
  if(e.key !== 'lzyyy-restored') return;
  buildTree(); renderTree(); renderList();
});

/* listAt(p): elenco figli al percorso p */
function listAt(p){
  let nodes = TREE;
  for(const seg of p){
    const node = nodes.find(n => n.name === seg);
    if(!node || !node.children) return [];
    nodes = node.children;
  }
  return nodes;
}

/* renderTree(): pannello sinistro = cartelle radice */
function renderTree(){
  treeEl.innerHTML = '';
  TREE.forEach(f => {
    const n = document.createElement('div');
    n.className = 'node' + (path[0] === f.name ? ' active' : '');
    n.textContent = '▸ ' + f.name;
    n.onclick = () => go([f.name]);
    treeEl.appendChild(n);
  });
}

/* rowMeta(node): colonne c1/c2/go in base al tipo */
function rowMeta(node){
  if(node.kind === 'folder' || node.kind === 'project'){
    const n = (node.children || []).length;
    return { c1:(node.type || 'dir'), c2:(node.date || `${n} elem.`), go:'' };
  }
  if(node.kind === 'song') return { c1:dur(node.ms), c2:node.date, go:'♪' };
  return { c1:node.dim || '--', c2:node.date || '--', go:'' };
}

/* renderList(): pannello destro per il percorso corrente */
function renderList(){
  listEl.innerHTML = '';
  const head = document.createElement('div');
  head.className = 'fm-row head';
  head.innerHTML = `<span>NOME</span><span>INFO</span><span>DATA</span><span>⇗</span>`;
  listEl.appendChild(head);

  const items = listAt(path);
  items.forEach(node => {
    const m = rowMeta(node);
    const ic = ICON[node.kind] || ICON.file;
    const el = document.createElement('div');
    el.className = 'fm-row ' + node.kind;
    el.innerHTML =
      `<span class="nm"><span class="ic">${ic}</span>${esc(node.name)}</span>` +
      `<span class="col">${esc(m.c1)}</span>` +
      `<span class="col">${esc(m.c2)}</span>` +
      `<span class="go">${m.go}</span>`;
    el.onclick = () => { selectRow(el); if(COARSE) activate(node); };
    el.ondblclick = () => activate(node);
    listEl.appendChild(el);
  });

  pathEl.textContent = '/' + (path.length ? path.join('/') + '/' : '');
  countEl.textContent = items.length + ' oggetti';
}

/* selectRow(el): selezione visiva */
function selectRow(el){
  listEl.querySelectorAll('.fm-row.selected').forEach(r => r.classList.remove('selected'));
  el.classList.add('selected');
}

/* activate(node): doppio click → azione per tipo */
function activate(node){
  if(node.kind === 'folder' || node.kind === 'project') return go([...path, node.name]);
  if(node.kind === 'song')   return window.open(node.url, '_blank', 'noopener');
  if(node.kind === 'file')   return flash('README.txt :: ho sampleato un ventilatore per 6 ore. nessun rimpianto.');
  if(node.kind === 'sample') return flash(`${node.name} :: stream audio non montato`);
  if(node.kind === 'img')    return flash(`${node.name} :: anteprima non disponibile [render fallito]`);
  if(node.kind === 'video')  return flash(`${node.name} :: codec sconosciuto — solo glitch.`);
  if(node.kind === 'corrupt')return flash(`${node.name} :: SETTORE ILLEGGIBILE — il disco urla.`);
}

/* go(p): naviga al percorso p (validato) */
function go(p){
  // tieni solo i segmenti validi
  let nodes = TREE, valid = [];
  for(const seg of p){
    const node = nodes.find(n => n.name === seg);
    if(!node) break;
    valid.push(seg);
    nodes = node.children || [];
  }
  path = valid;
  renderTree();
  renderList();
}

/* flash(msg): messaggio temporaneo in status bar */
let flashTimer = null;
function flash(msg){
  clearTimeout(flashTimer);
  countEl.textContent = msg;
  flashTimer = setTimeout(() => {
    countEl.textContent = listAt(path).length + ' oggetti';
  }, 2600);
}

/* Toolbar: sali di un livello */
document.getElementById('fm-up').onclick = () => go(path.slice(0, -1));

/* navFromString(str): naviga da percorso esterno (query/postMessage).
   str = segmenti encodeURIComponent uniti da '/'. */
function navFromString(str){
  if(!str) return;
  const segs = str.split('/').map(decodeURIComponent).filter(Boolean);
  go(segs);
}

/* Ascolta richieste di navigazione dal desktop (finestra già aperta) */
window.addEventListener('message', (e) => {
  if(e.data && e.data.type === 'fm-nav') navFromString(e.data.path);
});

/* loadDiscography(): dati vivi da data/discography.json */
async function loadDiscography(){
  try{
    const r = await fetch('../data/discography.json', { cache:'no-cache' });
    if(!r.ok) return;
    const data = await r.json();
    if(Array.isArray(data.projects) && data.projects.length){
      PROJECTS = data.projects;
      buildTree();
      go(path);   // ri-render mantenendo il percorso valido
    }
  }catch(_){ /* offline: resta lo snapshot */ }
}

/* Avvio: costruisci albero, applica eventuale percorso da query, render */
buildTree();
const initPath = location.hash ? location.hash.slice(1) : '';
// default: radice su touch (albero nascosto), Documenti su desktop
if(initPath) navFromString(initPath); else go(COARSE ? [] : ['Documenti']);
loadDiscography();
</script>
</body>
</html>
