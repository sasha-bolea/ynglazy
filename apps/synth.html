<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SYNTH</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=VT323&family=Orbitron:wght@400;700&family=IBM+Plex+Mono:wght@400;500&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
/* =========================================================
   SYNTH — pannello scheuomorfico analogico + sci-fi.
   PC-98 denso · Lain (hex) · viti/manopole/levette · oscilloscopio/Nixie.
   ========================================================= */
:root{
  --white:#f0ede8; --grey-l:#c8c3bc; --grey-m:#8a857e; --grey-d:#3a3732;
  --black:#111010; --ph:#d4f5a0; --am:#ffcc44; --panel:#1c1a17;
  --glow-ph:0 0 4px rgba(212,245,160,.55);
  --glow-am:0 0 5px rgba(255,204,68,.6);
  --metal: linear-gradient(180deg,#2b2824 0%,#211e1b 50%,#1a1815 100%);
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{
  font-family:'IBM Plex Mono',monospace; font-size:13px; color:var(--grey-l);
  cursor:crosshair; user-select:none; overflow:hidden;
  display:flex; flex-direction:column; position:relative;
  background:#141210;
  -webkit-tap-highlight-color:transparent;
}
/* sfondo hex (Lain), molto debole */
#sy-hex{
  position:absolute; inset:0; z-index:0; color:rgba(212,245,160,.05);
  font-family:'Share Tech Mono',monospace; font-size:11px; line-height:1.25;
  letter-spacing:1px; white-space:pre-wrap; word-break:break-all; overflow:hidden; pointer-events:none;
}

/* pannello metallico */
.sy-rack{
  position:relative; z-index:1; flex:1; min-height:0;
  margin:8px; padding:12px; display:flex; flex-direction:column; gap:10px;
  background:var(--metal);
  border:2px solid #0a0a09;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.06), inset 0 -3px 8px rgba(0,0,0,.5), 0 0 0 1px #000;
}
/* viti agli angoli */
.screw{ position:absolute; width:12px; height:12px; border-radius:50%;
  background:radial-gradient(circle at 35% 30%, #5a554d, #211e1b 70%);
  box-shadow:inset 0 0 2px #000, 0 1px 0 rgba(255,255,255,.08); z-index:5; }
.screw::before, .screw::after{ content:''; position:absolute; background:#0c0b0a; }
.screw::before{ left:2px; right:2px; top:5px; height:2px; }
.screw::after{ top:2px; bottom:2px; left:5px; width:2px; }
.screw.tl{ top:4px; left:4px; } .screw.tr{ top:4px; right:4px; }
.screw.bl{ bottom:4px; left:4px; } .screw.br{ bottom:4px; right:4px; }

/* targhetta */
.sy-name{ display:flex; align-items:baseline; gap:10px; padding:0 8px; }
.sy-name .b{ font-family:'Orbitron',sans-serif; font-weight:700; font-size:15px; letter-spacing:3px;
  color:var(--ph); text-shadow:var(--glow-ph); }
.sy-name .m{ font-family:'Share Tech Mono',monospace; font-size:10px; color:var(--grey-m); letter-spacing:1px; }

/* riga schermi: oscilloscopio + nixie */
.sy-screens{ display:flex; gap:10px; }
.scope{
  flex:1; position:relative; padding:6px;
  background:#070907; border:2px solid #000;
  box-shadow:inset 0 0 12px rgba(0,0,0,.8);
}
.scope::after{ content:''; position:absolute; inset:0; pointer-events:none;
  background:repeating-linear-gradient(to bottom, rgba(0,0,0,0) 0 2px, rgba(0,0,0,.25) 3px); }
#sy-scope{ display:block; width:100%; height:84px; }

/* display Nixie (nota corrente) */
.nixie{
  width:150px; flex-shrink:0; padding:6px 8px;
  background:#0a0806; border:2px solid #000;
  box-shadow:inset 0 0 10px rgba(0,0,0,.8);
  display:flex; flex-direction:column; gap:5px;
}
.nixie .lbl{ font-family:'Share Tech Mono',monospace; font-size:9px; color:var(--grey-m); letter-spacing:2px; }
.nixie .tubes{ display:flex; gap:3px; }
.nixie .tube{
  flex:1; text-align:center; padding:3px 0;
  background:linear-gradient(#1a140a,#0d0a06); border:1px solid #2a2014;
  font-family:'VT323',monospace; font-size:30px; line-height:1;
  color:var(--am); text-shadow:var(--glow-am);
}
.nixie .oct{ display:flex; align-items:center; justify-content:space-between;
  font-family:'Share Tech Mono',monospace; font-size:11px; color:var(--grey-m); margin-top:2px; }
.nixie .oct button{ width:20px; height:18px; cursor:crosshair; background:#1a1714; color:var(--am);
  border:1px solid #000; box-shadow:inset 0 1px 0 rgba(255,255,255,.06); }
.nixie .oct .ov{ color:var(--ph); text-shadow:var(--glow-ph); }

/* riga controlli: levette waveform + manopole */
.sy-controls{ display:flex; gap:14px; align-items:stretch; padding:2px 4px; }
.sy-sub{ display:flex; flex-direction:column; gap:6px; padding:8px 10px;
  background:rgba(0,0,0,.18); border:1px solid #0a0a09; box-shadow:inset 0 1px 0 rgba(255,255,255,.04); }
.sy-sub .cap{ font-family:'Share Tech Mono',monospace; font-size:9px; letter-spacing:2px; color:var(--grey-m); text-align:center; }

/* interruttori a levetta */
.switches{ display:flex; gap:8px; }
.sw{ display:flex; flex-direction:column; align-items:center; gap:4px; cursor:crosshair; width:40px; touch-action:none; }
.sw .led{ width:7px; height:7px; border-radius:50%; background:#2a2a26; box-shadow:inset 0 0 2px #000; }
.sw.on .led{ background:var(--ph); box-shadow:0 0 6px var(--ph); }
.sw .track{ width:18px; height:30px; background:linear-gradient(#0c0b0a,#1a1714); border:1px solid #000;
  border-radius:3px; position:relative; box-shadow:inset 0 0 3px #000; }
.sw .lever{ position:absolute; left:2px; right:2px; height:13px; bottom:2px;
  background:linear-gradient(#7a746a,#403c35); border:1px solid #000; border-radius:2px;
  transition:bottom .08s; }
.sw.on .lever{ bottom:15px; background:linear-gradient(#d4f5a0,#9bbf5e); }
.sw .t{ font-family:'Share Tech Mono',monospace; font-size:10px; color:var(--grey-l); letter-spacing:1px; }
.sw.on .t{ color:var(--ph); text-shadow:var(--glow-ph); }

/* manopole */
.knobs{ flex:1; display:flex; gap:10px; justify-content:space-around; align-items:flex-start;
  padding:8px 8px 4px; background:rgba(0,0,0,.18); border:1px solid #0a0a09;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.04); }
.knob{ display:flex; flex-direction:column; align-items:center; gap:4px; width:58px; }
.knob .cap{ font-family:'Share Tech Mono',monospace; font-size:9px; letter-spacing:1px; color:var(--grey-m); }
.knob .dial{ width:42px; height:42px; border-radius:50%; position:relative; cursor:crosshair; touch-action:none;
  background:radial-gradient(circle at 38% 32%, #4a463f, #211e1b 72%);
  border:2px solid #000; box-shadow:inset 0 2px 3px rgba(255,255,255,.08), inset 0 -3px 4px rgba(0,0,0,.6), 0 2px 3px rgba(0,0,0,.5); }
.knob .dial .ind{ position:absolute; left:50%; top:5px; width:2px; height:13px; margin-left:-1px;
  background:var(--am); box-shadow:0 0 4px var(--am); transform-origin:50% 16px; }
.knob .val{ font-family:'Share Tech Mono',monospace; font-size:10px; color:var(--am); text-shadow:var(--glow-am); }

/* tastiera pixel-art */
.sy-kb-wrap{ display:flex; align-items:center; justify-content:center; padding:6px 4px 2px; }
.sy-kb{ position:relative; height:120px; touch-action:none; }
.wkey{ position:relative; float:left; width:34px; height:120px;
  background:linear-gradient(#e8e4dc,#cfc9c0 70%,#b9b3aa);
  border:2px solid #0a0a09; border-top-width:3px;
  box-shadow:inset 0 -7px 0 rgba(0,0,0,.18), inset 0 3px 0 rgba(255,255,255,.5);
  image-rendering:pixelated; cursor:crosshair;
  display:flex; align-items:flex-end; justify-content:center; padding-bottom:5px; }
.wkey + .wkey{ border-left-width:1px; }
.wkey .kl{ font-family:'VT323',monospace; font-size:14px; color:#5a554e; }
.wkey.on{ background:linear-gradient(#d4f5a0,#aacf6e); box-shadow:inset 0 -5px 0 rgba(0,0,0,.2), 0 0 12px rgba(212,245,160,.7); }
.bkey{ position:absolute; top:0; width:20px; height:76px; z-index:3;
  background:linear-gradient(#2a2824,#131210 80%);
  border:2px solid #000; border-bottom-width:5px;
  box-shadow:inset 0 3px 0 rgba(255,255,255,.08), 0 4px 0 rgba(0,0,0,.5);
  image-rendering:pixelated; cursor:crosshair; }
.bkey.on{ background:linear-gradient(#ffcc44,#b88a1f); box-shadow:0 0 12px rgba(255,204,68,.7); }

.sy-foot{ position:relative; z-index:1; padding:3px 14px; background:#0f0e0c; border-top:1px solid var(--grey-m);
  font-family:'Share Tech Mono',monospace; font-size:10px; color:var(--grey-m); }
.sy-foot b{ color:var(--grey-l); }

/* Mobile: controlli impilati, manopole a capo, schermi compatti */
@media (max-width:480px){
  body{ overflow-y:auto; }
  .sy-rack{ margin:5px; padding:8px; gap:8px; }
  .nixie{ width:118px; }
  #sy-scope{ height:64px; }
  .sy-controls{ flex-direction:column; gap:8px; }
  .switches{ justify-content:space-around; }
  .knobs{ flex-wrap:wrap; gap:6px; justify-content:center; }
  .knob{ width:30%; }
  .sy-foot{ padding:3px 8px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
}
/* Touch: il suggerimento tastiera PC non ha senso */
@media (pointer:coarse){
  .pc-hint{ display:none; }
}
</style>
</head>
<body>

<div id="sy-hex"></div>

<div class="sy-rack">
  <span class="screw tl"></span><span class="screw tr"></span>
  <span class="screw bl"></span><span class="screw br"></span>

  <div class="sy-name"><span class="b">SYNTH-7</span><span class="m">// MONO OSC · ADSR · LP-FILTER · 0x4C5A</span></div>

  <div class="sy-screens">
    <div class="scope"><canvas id="sy-scope"></canvas></div>
    <div class="nixie">
      <span class="lbl">NOTE</span>
      <div class="tubes"><div class="tube" id="nx0">–</div><div class="tube" id="nx1">–</div></div>
      <div class="oct"><span>OCT</span>
        <span><button id="oct-down">−</button> <span class="ov" id="oct-val">C4</span> <button id="oct-up">+</button></span>
      </div>
    </div>
  </div>

  <div class="sy-controls">
    <div class="sy-sub">
      <span class="cap">WAVE</span>
      <div class="switches" id="sy-waves">
        <div class="sw on" data-w="sawtooth"><span class="led"></span><span class="track"><span class="lever"></span></span><span class="t">SAW</span></div>
        <div class="sw" data-w="square"><span class="led"></span><span class="track"><span class="lever"></span></span><span class="t">SQR</span></div>
        <div class="sw" data-w="triangle"><span class="led"></span><span class="track"><span class="lever"></span></span><span class="t">TRI</span></div>
        <div class="sw" data-w="sine"><span class="led"></span><span class="track"><span class="lever"></span></span><span class="t">SIN</span></div>
      </div>
    </div>
    <div class="knobs" id="sy-knobs"></div>
  </div>

  <div class="sy-kb-wrap"><div class="sy-kb" id="sy-kb"></div></div>
</div>

<div class="sy-foot"><span class="pc-hint">tastiera PC: <b>A W S E D F T G Y H U J K</b> · </span>tocca/trascina i tasti · trascina le manopole<span class="pc-hint"> (doppio-click = reset)</span></div>

<script>
/* =========================================================
   SYNTH — Web Audio + oscilloscopio + manopole + tastiera
   ========================================================= */
/* WW/BW ricalcolati da buildKeyboard() in base allo spazio disponibile */
let WW = 34, BW = 20;
const OCTAVES = 2;
const WHITE = [ {n:'C',s:0},{n:'D',s:2},{n:'E',s:4},{n:'F',s:5},{n:'G',s:7},{n:'A',s:9},{n:'B',s:11} ];
const BLACK = [ {n:'C#',s:1,after:0},{n:'D#',s:3,after:1},{n:'F#',s:6,after:3},{n:'G#',s:8,after:4},{n:'A#',s:10,after:5} ];
const KEYMAP = { a:0,w:1,s:2,e:3,d:4,f:5,t:6,g:7,y:8,h:9,u:10,j:11,k:12,o:13,l:14,p:15 };
const NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];

const kbEl = document.getElementById('sy-kb');
let waveform = 'sawtooth';
let octaveShift = 0;
let mouseDown = false;
const voices = {};

/* --- Web Audio --- */
let actx=null, master=null, filter=null, analyser=null, scopeData=null;
function ensureAudio(){
  if(actx) return;
  actx = new (window.AudioContext || window.webkitAudioContext)();
  filter = actx.createBiquadFilter(); filter.type='lowpass';
  master = actx.createGain();
  analyser = actx.createAnalyser(); analyser.fftSize = 1024;
  scopeData = new Uint8Array(analyser.fftSize);
  filter.connect(master); master.connect(analyser); analyser.connect(actx.destination);
  applyControls();
}
const ctl = { a:0.04, d:0.2, s:0.6, r:0.25, cut:0.8, vol:0.5 };
function applyControls(){
  if(master) master.gain.value = ctl.vol*0.5;
  if(filter) filter.frequency.value = 120 + ctl.cut*ctl.cut*11000;
}

function freqOf(semi){ const midi=60+octaveShift*12+semi; return 440*Math.pow(2,(midi-69)/12); }
function nameOf(semi){ const midi=60+octaveShift*12+semi; return NAMES[((midi%12)+12)%12] + (Math.floor(midi/12)-1); }

/* noteOn / noteOff con inviluppo ADSR */
function noteOn(semi){
  ensureAudio();
  if(actx.state==='suspended') actx.resume();
  if(voices[semi]) return;
  const now=actx.currentTime;
  const osc=actx.createOscillator(); osc.type=waveform; osc.frequency.value=freqOf(semi);
  const g=actx.createGain(); const peak=0.9;
  g.gain.setValueAtTime(0.0001,now);
  g.gain.linearRampToValueAtTime(peak,now+ctl.a+0.001);
  g.gain.linearRampToValueAtTime(peak*ctl.s,now+ctl.a+ctl.d+0.001);
  osc.connect(g); g.connect(filter); osc.start();
  voices[semi]={osc,g};
  lightKey(semi,true); showNote(nameOf(semi));
}
function noteOff(semi){
  const v=voices[semi]; if(!v) return;
  const now=actx.currentTime;
  v.g.gain.cancelScheduledValues(now);
  v.g.gain.setValueAtTime(v.g.gain.value,now);
  v.g.gain.linearRampToValueAtTime(0.0001,now+ctl.r+0.01);
  v.osc.stop(now+ctl.r+0.05);
  delete voices[semi]; lightKey(semi,false);
}
function lightKey(semi,on){ const el=kbEl.querySelector(`[data-semi="${semi}"]`); if(el) el.classList.toggle('on',on); }

/* display Nixie */
function showNote(name){
  document.getElementById('nx0').textContent = name[0] + (name[1]==='#'?'#':'');
  document.getElementById('nx1').textContent = name.replace('#','').slice(1);
}

/* tastiera pixel-art — larghezza tasti adattiva al contenitore */
function buildKeyboard(){
  // 14 tasti bianchi devono stare nello spazio del wrap (min 18px, max 34px)
  const avail = kbEl.parentElement.clientWidth || OCTAVES*7*34;
  WW = Math.max(18, Math.min(34, Math.floor(avail/(OCTAVES*7))));
  BW = Math.max(11, Math.round(WW*0.58));
  kbEl.innerHTML=''; let wc=0;
  for(let oct=0;oct<OCTAVES;oct++){
    WHITE.forEach((w)=>{ const semi=oct*12+w.s; const k=document.createElement('div');
      k.className='wkey'; k.dataset.semi=semi; k.style.width=WW+'px';
      k.innerHTML=`<span class="kl">${w.n==='C'?'C'+(4+oct+octaveShift):''}</span>`;
      attachKey(k,semi); kbEl.appendChild(k); wc++; });
    BLACK.forEach((b)=>{ const semi=oct*12+b.s; const k=document.createElement('div');
      k.className='bkey'; k.dataset.semi=semi; k.style.width=BW+'px';
      k.style.left=((oct*7+b.after+1)*WW - BW/2)+'px';
      attachKey(k,semi); kbEl.appendChild(k); });
  }
  kbEl.style.width=(wc*WW)+'px';
}
/* Ricostruisce la tastiera quando il contenitore cambia larghezza (debounce) */
let kbResizeT=null;
new ResizeObserver(()=>{
  clearTimeout(kbResizeT);
  kbResizeT=setTimeout(()=>{
    const avail=kbEl.parentElement.clientWidth || OCTAVES*7*34;
    const nw=Math.max(18, Math.min(34, Math.floor(avail/(OCTAVES*7))));
    if(nw!==WW) buildKeyboard();
  },120);
}).observe(kbEl.parentElement || document.body);
function attachKey(el,semi){
  el.addEventListener('pointerdown',(e)=>{ e.preventDefault(); mouseDown=true; noteOn(semi);
    // touch cattura implicitamente il pointer: rilascia per permettere il glissando
    try{ el.releasePointerCapture(e.pointerId); }catch(_){}
  });
  el.addEventListener('pointerenter',()=>{ if(mouseDown) noteOn(semi); });
  el.addEventListener('pointerup',()=>noteOff(semi));
  el.addEventListener('pointerleave',()=>{ if(mouseDown) noteOff(semi); });
  el.addEventListener('pointercancel',()=>noteOff(semi));   // touch interrotto dal browser
}
window.addEventListener('pointerup',()=>{ mouseDown=false; });

/* Sblocco audio mobile: i browser touch tengono l'AudioContext "suspended"
   finché resume() non avviene dentro un gesto completo (touchend/pointerup).
   Resta in ascolto finché il contesto non è davvero "running". */
function unlockAudio(){
  ensureAudio();
  actx.resume().then(()=>{
    if(actx.state==='running'){
      window.removeEventListener('touchend', unlockAudio);
      window.removeEventListener('pointerup', unlockAudio);
    }
  }).catch(()=>{});
}
window.addEventListener('touchend', unlockAudio);
window.addEventListener('pointerup', unlockAudio);

/* levette waveform */
document.getElementById('sy-waves').addEventListener('click',(e)=>{
  const b=e.target.closest('.sw'); if(!b) return;
  document.querySelectorAll('.sw').forEach(x=>x.classList.remove('on'));
  b.classList.add('on'); waveform=b.dataset.w;
  Object.values(voices).forEach(v=>v.osc.type=waveform);
});

/* ottava */
function setOct(d){ octaveShift=Math.max(-3,Math.min(3,octaveShift+d));
  document.getElementById('oct-val').textContent='C'+(4+octaveShift); buildKeyboard(); }
document.getElementById('oct-up').onclick=()=>setOct(1);
document.getElementById('oct-down').onclick=()=>setOct(-1);

/* --- MANOPOLE rotanti (drag verticale + wheel + dblclick reset) --- */
const KNOBS = [
  { key:'A',  def:4,  fmt:v=>{ctl.a=v/100*1.2; return ctl.a.toFixed(2)+'s';} },
  { key:'D',  def:20, fmt:v=>{ctl.d=v/100*1.2; return ctl.d.toFixed(2)+'s';} },
  { key:'S',  def:60, fmt:v=>{ctl.s=v/100; return Math.round(v)+'%';} },
  { key:'R',  def:25, fmt:v=>{ctl.r=v/100*1.5; return ctl.r.toFixed(2)+'s';} },
  { key:'CUT',def:80, fmt:v=>{ctl.cut=v/100; applyControls(); return (filter?Math.round(filter.frequency.value):0)+'Hz';} },
  { key:'VOL',def:50, fmt:v=>{ctl.vol=v/100; applyControls(); return Math.round(v)+'%';} },
];
function makeKnob(cfg){
  const wrap=document.createElement('div'); wrap.className='knob';
  wrap.innerHTML=`<span class="cap">${cfg.key}</span><span class="dial"></span><span class="val"></span>`;
  const dial=wrap.querySelector('.dial'), val=wrap.querySelector('.val');
  let v=cfg.def;
  function render(){
    const ang = -135 + (v/100)*270;
    dialIndicator(dial, ang);
    val.textContent = cfg.fmt(v);
  }
  function set(nv){ v=Math.max(0,Math.min(100,nv)); render(); }
  // drag verticale
  let sy=0, sv=0, drag=false;
  dial.addEventListener('pointerdown',(e)=>{ ensureAudio(); drag=true; sy=e.clientY; sv=v; dial.setPointerCapture(e.pointerId); e.preventDefault(); });
  dial.addEventListener('pointermove',(e)=>{ if(!drag) return; set(sv + (sy-e.clientY)*0.6); });
  dial.addEventListener('pointerup',()=>{ drag=false; });
  dial.addEventListener('wheel',(e)=>{ ensureAudio(); e.preventDefault(); set(v - Math.sign(e.deltaY)*3); },{passive:false});
  dial.addEventListener('dblclick',()=>{ ensureAudio(); set(cfg.def); });
  render();
  return wrap;
}
/* dialIndicator: ruota la lancetta della manopola */
function dialIndicator(dial,ang){
  // usa una pseudo via inline style su un figlio dedicato
  let line=dial.querySelector('.ind');
  if(!line){ line=document.createElement('span'); line.className='ind'; dial.appendChild(line); }
  line.style.transform=`rotate(${ang}deg)`;
}
const knobsEl=document.getElementById('sy-knobs');
KNOBS.forEach(c=>knobsEl.appendChild(makeKnob(c)));

/* tastiera del computer */
const held=new Set();
window.addEventListener('keydown',(e)=>{ const k=e.key.toLowerCase();
  if(!(k in KEYMAP)||held.has(k)) return; held.add(k); noteOn(KEYMAP[k]); });
window.addEventListener('keyup',(e)=>{ const k=e.key.toLowerCase();
  if(!(k in KEYMAP)) return; held.delete(k); noteOff(KEYMAP[k]); });

/* --- OSCILLOSCOPIO --- */
const scope=document.getElementById('sy-scope');
const sctx=scope.getContext('2d');
function sizeScope(){ scope.width=scope.clientWidth; scope.height=scope.clientHeight; }
new ResizeObserver(sizeScope).observe(scope); sizeScope();
function drawScope(){
  const W=scope.width, H=scope.height;
  sctx.clearRect(0,0,W,H);
  // griglia
  sctx.strokeStyle='rgba(212,245,160,.10)';
  sctx.beginPath(); sctx.moveTo(0,H/2); sctx.lineTo(W,H/2); sctx.stroke();
  if(analyser){
    analyser.getByteTimeDomainData(scopeData);
    sctx.strokeStyle='#d4f5a0'; sctx.lineWidth=2; sctx.shadowColor='#d4f5a0'; sctx.shadowBlur=6;
    sctx.beginPath();
    const step=W/scopeData.length;
    for(let i=0;i<scopeData.length;i++){
      const y=(scopeData[i]/255)*H;
      i?sctx.lineTo(i*step,y):sctx.moveTo(0,y);
    }
    sctx.stroke(); sctx.shadowBlur=0;
  } else {
    sctx.strokeStyle='rgba(212,245,160,.5)'; sctx.beginPath(); sctx.moveTo(0,H/2); sctx.lineTo(W,H/2); sctx.stroke();
  }
  requestAnimationFrame(drawScope);
}

/* sfondo hex (Lain) */
(function hex(){
  const chars='0123456789ABCDEF'; let out='';
  for(let i=0;i<2200;i++){ out+=chars[(Math.random()*16)|0]; if((i+1)%2===0)out+=' '; if((i+1)%56===0)out+='\n'; }
  document.getElementById('sy-hex').textContent=out;
})();

// Avvio
buildKeyboard();
requestAnimationFrame(drawScope);
</script>
