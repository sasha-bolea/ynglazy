<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAMPLEBANK</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=VT323&family=Orbitron:wght@700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
/* =========================================================
   SAMPLEBANK — griglia di pad MPC. Ogni pad genera un suono
   strano via Web Audio (niente file: tutto sintetizzato).
   ========================================================= */
:root{
  --white:#f0ede8; --grey-l:#c8c3bc; --grey-m:#8a857e; --grey-d:#3a3732;
  --black:#111010; --ph:#d4f5a0; --am:#ffcc44; --panel:#1c1a17;
  --glow-ph:0 0 4px rgba(212,245,160,.55);
  --glow-am:0 0 5px rgba(255,204,68,.6);
  --metal: linear-gradient(180deg,#2b2824 0%,#211e1b 50%,#1a1815 100%);
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{
  background:#141210; color:var(--grey-l);
  font-family:'Share Tech Mono',monospace; font-size:13px;
  cursor:crosshair; user-select:none; overflow:hidden;
  display:flex; flex-direction:column;
  -webkit-tap-highlight-color:transparent;
}

.sb-rack{
  flex:1; min-height:0; margin:8px; padding:12px;
  display:flex; flex-direction:column; gap:10px;
  background:var(--metal); border:2px solid #0a0a09;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.06), inset 0 -3px 8px rgba(0,0,0,.5), 0 0 0 1px #000;
}
.sb-name{ display:flex; align-items:baseline; gap:10px; padding:0 4px; }
.sb-name .b{ font-family:'Orbitron',sans-serif; font-weight:700; font-size:15px; letter-spacing:3px;
  color:var(--ph); text-shadow:var(--glow-ph); }
.sb-name .m{ font-size:10px; color:var(--grey-m); letter-spacing:1px; }

/* griglia pad */
.sb-pads{
  flex:1; min-height:0;
  display:grid; grid-template-columns:repeat(3,1fr); grid-auto-rows:1fr; gap:8px;
}
.pad{
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px;
  min-height:62px; padding:6px;
  background:linear-gradient(#26231f,#1a1815);
  border:2px solid #0a0a09; border-bottom-width:4px;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.07);
  cursor:crosshair; touch-action:none; text-align:center;
}
.pad .nm{ font-size:11px; letter-spacing:1px; color:var(--grey-l); word-break:break-word; }
.pad .meta{ font-size:9px; color:var(--grey-m); }
.pad.on{
  background:linear-gradient(#3a4527,#222b15);
  border-color:var(--ph);
  box-shadow:0 0 14px rgba(212,245,160,.5), inset 0 1px 0 rgba(255,255,255,.07);
}
.pad.on .nm{ color:var(--ph); text-shadow:var(--glow-ph); }
.pad.mystery .nm{ color:var(--am); text-shadow:var(--glow-am); }

/* barra stato in basso */
.sb-status{
  flex-shrink:0; height:22px; display:flex; align-items:center; justify-content:space-between;
  padding:0 10px; background:#0f0e0c; border-top:1px solid var(--grey-m);
  font-size:11px; color:var(--grey-m);
}
.sb-status .nm{ color:var(--am); text-shadow:var(--glow-am);
  overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

@media (max-width:480px){
  .sb-rack{ margin:5px; padding:8px; gap:8px; }
  .pad{ min-height:56px; }
}
</style>
</head>
<body>

<div class="sb-rack">
  <div class="sb-name"><span class="b">SAMPLEBANK</span><span class="m">// 9 PAD · SINTESI LIVE · 0x4C5A</span></div>
  <div class="sb-pads" id="sb-pads"></div>
</div>

<div class="sb-status">
  <span class="nm" id="sb-now">tocca un pad</span>
  <span>banco A · 847 TB liberi</span>
</div>

<script>
/* =========================================================
   SAMPLEBANK — sintesi Web Audio per ogni pad
   ========================================================= */
let actx = null;
/* ensureAudio(): crea il contesto al primo gesto e lo riattiva */
function ensureAudio(){
  if(!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
  if(actx.state === 'suspended') actx.resume();
  return actx;
}

/* noiseBuffer(sec): buffer di rumore bianco riutilizzabile */
let noiseBuf = null;
function noiseBuffer(){
  if(noiseBuf) return noiseBuf;
  const len = actx.sampleRate * 2;
  noiseBuf = actx.createBuffer(1, len, actx.sampleRate);
  const d = noiseBuf.getChannelData(0);
  for(let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
  return noiseBuf;
}

/* env(g, t0, a, dur): inviluppo attack/decay su un gain */
function env(g, t0, a, dur, peak = 0.5){
  g.gain.setValueAtTime(0.0001, t0);
  g.gain.linearRampToValueAtTime(peak, t0 + a);
  g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
}

/* --- suoni: ogni funzione suona e ritorna la durata in ms --- */
const SOUNDS = {

  /* rumore filtrato con LFO lento: il famoso ventilatore */
  ventilatore(){
    const t0 = actx.currentTime, DUR = 2.6;
    const src = actx.createBufferSource(); src.buffer = noiseBuffer(); src.loop = true;
    const lp = actx.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 420; lp.Q.value = 2;
    const lfo = actx.createOscillator(); lfo.frequency.value = 1.2;
    const lfoG = actx.createGain(); lfoG.gain.value = 180;
    lfo.connect(lfoG); lfoG.connect(lp.frequency);
    const g = actx.createGain(); env(g, t0, 0.4, DUR, 0.4);
    src.connect(lp); lp.connect(g); g.connect(actx.destination);
    src.start(t0); lfo.start(t0); src.stop(t0 + DUR); lfo.stop(t0 + DUR);
    return DUR * 1000;
  },

  /* hum a 50Hz + armoniche: il frigo alle 3 di notte */
  frigo(){
    const t0 = actx.currentTime, DUR = 2.2;
    const g = actx.createGain(); env(g, t0, 0.3, DUR, 0.25);
    g.connect(actx.destination);
    [50, 100, 151].forEach((f, i) => {
      const o = actx.createOscillator(); o.type = 'sine'; o.frequency.value = f;
      const og = actx.createGain(); og.gain.value = 1 / (i + 1);
      o.connect(og); og.connect(g); o.start(t0); o.stop(t0 + DUR);
    });
    return DUR * 1000;
  },

  /* kick 808: sinusoide con pitch che precipita */
  kick(){
    const t0 = actx.currentTime, DUR = 0.5;
    const o = actx.createOscillator(); o.type = 'sine';
    o.frequency.setValueAtTime(150, t0);
    o.frequency.exponentialRampToValueAtTime(38, t0 + 0.12);
    const g = actx.createGain(); env(g, t0, 0.004, DUR, 0.9);
    o.connect(g); g.connect(actx.destination);
    o.start(t0); o.stop(t0 + DUR);
    return DUR * 1000;
  },

  /* hat arrugginito: rumore corto passa-alto */
  hat(){
    const t0 = actx.currentTime, DUR = 0.12;
    const src = actx.createBufferSource(); src.buffer = noiseBuffer();
    const hp = actx.createBiquadFilter(); hp.type = 'highpass'; hp.frequency.value = 6500;
    const g = actx.createGain(); env(g, t0, 0.002, DUR, 0.35);
    src.connect(hp); hp.connect(g); g.connect(actx.destination);
    src.start(t0); src.stop(t0 + DUR);
    return DUR * 1000;
  },

  /* laser: quadra che scivola giù di due ottave */
  laser(){
    const t0 = actx.currentTime, DUR = 0.45;
    const o = actx.createOscillator(); o.type = 'square';
    o.frequency.setValueAtTime(1800, t0);
    o.frequency.exponentialRampToValueAtTime(120, t0 + DUR * 0.9);
    const g = actx.createGain(); env(g, t0, 0.005, DUR, 0.3);
    o.connect(g); g.connect(actx.destination);
    o.start(t0); o.stop(t0 + DUR);
    return DUR * 1000;
  },

  /* vetro: FM metallico breve */
  vetro(){
    const t0 = actx.currentTime, DUR = 0.7;
    const car = actx.createOscillator(); car.type = 'sine'; car.frequency.value = 1230;
    const mod = actx.createOscillator(); mod.frequency.value = 1789;
    const mg = actx.createGain(); mg.gain.value = 900;
    mod.connect(mg); mg.connect(car.frequency);
    const g = actx.createGain(); env(g, t0, 0.003, DUR, 0.3);
    car.connect(g); g.connect(actx.destination);
    car.start(t0); mod.start(t0); car.stop(t0 + DUR); mod.stop(t0 + DUR);
    return DUR * 1000;
  },

  /* 987: tre beep in countdown (9 → 8 → 7 semitoni sopra il LA) */
  novecento(){
    const t0 = actx.currentTime, STEP = 0.22;
    [9, 8, 7].forEach((semi, i) => {
      const o = actx.createOscillator(); o.type = 'triangle';
      o.frequency.value = 440 * Math.pow(2, semi / 12);
      const g = actx.createGain(); env(g, t0 + i * STEP, 0.005, STEP * 0.9, 0.4);
      o.connect(g); g.connect(actx.destination);
      o.start(t0 + i * STEP); o.stop(t0 + (i + 1) * STEP);
    });
    return 3 * STEP * 1000;
  },

  /* CLICK!: impulso secco, quasi niente */
  click(){
    const t0 = actx.currentTime, DUR = 0.03;
    const src = actx.createBufferSource(); src.buffer = noiseBuffer();
    const bp = actx.createBiquadFilter(); bp.type = 'bandpass'; bp.frequency.value = 2400; bp.Q.value = 6;
    const g = actx.createGain(); env(g, t0, 0.001, DUR, 0.8);
    src.connect(bp); bp.connect(g); g.connect(actx.destination);
    src.start(t0); src.stop(t0 + DUR);
    return 120;
  },

  /* ???: pad inquietante al contrario — easter egg audio */
  mystery(){
    const t0 = actx.currentTime, DUR = 3.2;
    const g = actx.createGain();
    // inviluppo invertito: cresce fino alla fine poi tronca (suono "al contrario")
    g.gain.setValueAtTime(0.0001, t0);
    g.gain.exponentialRampToValueAtTime(0.35, t0 + DUR - 0.05);
    g.gain.linearRampToValueAtTime(0.0001, t0 + DUR);
    g.connect(actx.destination);
    [66, 66.6, 99.9].forEach((f) => {
      const o = actx.createOscillator(); o.type = 'sawtooth'; o.frequency.value = f;
      const lp = actx.createBiquadFilter(); lp.type = 'lowpass';
      lp.frequency.setValueAtTime(180, t0);
      lp.frequency.exponentialRampToValueAtTime(2400, t0 + DUR);
      o.connect(lp); lp.connect(g);
      o.start(t0); o.stop(t0 + DUR);
    });
    return DUR * 1000;
  },
};

/* --- definizione pad: nome a video, metadata fake, suono --- */
const PADS = [
  { nm:'VENTILATORE_6H', meta:'6.0 GB · 1984',  fn:'ventilatore' },
  { nm:'FRIGO_3AM',      meta:'333 MB · 03:00', fn:'frigo' },
  { nm:'808_LZY',        meta:'0.5 s · sub',    fn:'kick' },
  { nm:'HAT_RUGGINE',    meta:'120 ms · ossido',fn:'hat' },
  { nm:'LASER_↓',        meta:'2 ottave · giù', fn:'laser' },
  { nm:'VETRO_ROTTO',    meta:'FM · 1.2 kHz',   fn:'vetro' },
  { nm:'987',            meta:'3 beep · count', fn:'novecento' },
  { nm:'CLICK!',         meta:'30 ms · tutto qui', fn:'click' },
  { nm:'???',            meta:'?? ?? · ??',     fn:'mystery', mystery:true },
];

const padsEl = document.getElementById('sb-pads');
const nowEl = document.getElementById('sb-now');

/* messaggi della barra stato per il pad misterioso */
const MYSTERY_MSGS = [
  'non dovevi premerlo.',
  'questo suono ti ha sentito.',
  '0x4C5A5959 — canale aperto.',
  'ok ora basta.',
];
let mysteryCount = 0;

/* buildPads(): crea la griglia e collega i suoni */
PADS.forEach((p) => {
  const el = document.createElement('div');
  el.className = 'pad' + (p.mystery ? ' mystery' : '');
  el.innerHTML = `<span class="nm">${p.nm}</span><span class="meta">${p.meta}</span>`;
  el.addEventListener('pointerdown', (e) => {
    e.preventDefault();
    ensureAudio();
    const ms = SOUNDS[p.fn]();
    el.classList.add('on');
    setTimeout(() => el.classList.remove('on'), Math.min(ms, 2000));
    if(p.mystery){
      nowEl.textContent = MYSTERY_MSGS[Math.min(mysteryCount++, MYSTERY_MSGS.length - 1)];
    } else {
      nowEl.textContent = '▶ ' + p.nm;
    }
  });
  padsEl.appendChild(el);
});
</script>
</body>
</html>
